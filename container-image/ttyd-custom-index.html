<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Claude Code Terminal</title>
<style>
  /* ttyd 기본 스타일 유지 */
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
  #terminal { position: absolute; top: 36px; left: 0; right: 0; bottom: 0; }

  /* 모드 선택 상단 바 */
  #mode-bar {
    position: fixed; top: 0; left: 0; right: 0; height: 36px;
    background: #0d1117; border-bottom: 1px solid #30363d;
    display: flex; align-items: center; gap: 8px; padding: 0 12px;
    font: 12px/1 -apple-system, "Segoe UI", Roboto, sans-serif; color: #c9d1d9;
    z-index: 50;
  }
  #mode-bar .label { color: #8b949e; margin-right: 4px; }
  #mode-bar button {
    background: #161b22; color: #c9d1d9; border: 1px solid #30363d;
    padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 12px;
    transition: all 120ms;
  }
  #mode-bar button:hover { border-color: #58a6ff; color: #fff; }
  #mode-bar button.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }
  #mode-bar .hint { margin-left: auto; color: #6e7681; font-size: 11px; }
  /* 새 터미널 탭 버튼 — mode-bar 우측 */
  #btn-new-term { margin-left: 8px; border-color: #1f6feb; color: #79c0ff; }
  #btn-new-term:hover { background: #1f6feb; color: #fff; border-color: #1f6feb; }

  /* 모드 변경 확인 모달 */
  #mode-modal {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 2000;
    align-items: center; justify-content: center;
  }
  #mode-modal.active { display: flex; }
  #mode-modal .card {
    background: #161b22; border: 1px solid #30363d; border-radius: 10px;
    padding: 24px; max-width: 420px; color: #c9d1d9; font-family: -apple-system, sans-serif;
  }
  #mode-modal h3 { margin: 0 0 12px; color: #fff; font-size: 16px; }
  #mode-modal p { margin: 8px 0; font-size: 13px; line-height: 1.5; color: #8b949e; }
  #mode-modal .actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
  #mode-modal button {
    padding: 8px 16px; border-radius: 6px; border: 1px solid #30363d;
    background: #21262d; color: #c9d1d9; cursor: pointer; font-size: 13px;
  }
  #mode-modal button.primary { background: #238636; border-color: #2ea043; color: #fff; }
  #mode-modal button:hover { filter: brightness(1.15); }

  /* 이미지 붙여넣기 미리보기 */
  #paste-preview {
    display: none;
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    background: #1e1e1e; border: 2px solid #58a6ff; border-radius: 12px;
    padding: 16px; z-index: 1000; max-width: 400px; text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  }
  #paste-preview img { max-width: 360px; max-height: 300px; border-radius: 8px; margin-bottom: 12px; }
  #paste-preview .actions { display: flex; gap: 8px; justify-content: center; }
  #paste-preview button {
    padding: 6px 18px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem;
  }
  #paste-preview .btn-send { background: #238636; color: #fff; }
  #paste-preview .btn-cancel { background: #21262d; color: #8b949e; border: 1px solid #30363d; }
  #paste-preview .label { color: #8b949e; font-size: 0.8rem; margin-bottom: 8px; }

  /* 클립보드 토스트 */
  #clip-toast {
    display: none; position: fixed; bottom: 20px; right: 20px;
    padding: 8px 16px; background: #1e293b; border: 1px solid #58a6ff;
    border-radius: 6px; color: #e6edf3; font-size: 0.82rem; z-index: 100;
  }
</style>
</head>
<body>
<div id="mode-bar">
  <span class="label">모드:</span>
  <button id="btn-mode-1" onclick="requestModeChange('1')">답변만 받기</button>
  <button id="btn-mode-2" onclick="requestModeChange('2')">진행과정 자세히 보기</button>
  <span class="hint">모드 변경 시 터미널 재시작</span>
  <button id="btn-new-term" onclick="openNewTerminal()"
          title="같은 Pod에 새 브라우저 탭으로 터미널 연결 (최대 3개)">
    + 새 터미널 탭
  </button>
</div>

<div id="mode-modal">
  <div class="card">
    <h3 id="mode-modal-title">모드를 변경하시겠습니까?</h3>
    <p id="mode-modal-desc"></p>
    <p style="color:#da3633;">⚠ 진행 중인 Claude 세션이 종료되고 브라우저가 새로고침됩니다.</p>
    <div class="actions">
      <button onclick="closeModeModal()">취소</button>
      <button class="primary" id="mode-modal-confirm">변경하고 재시작</button>
    </div>
  </div>
</div>

<div id="terminal"></div>

<div id="paste-preview">
  <div class="label">이미지를 Claude에게 전송합니다</div>
  <img id="paste-img" src="">
  <div class="actions">
    <button class="btn-send" onclick="sendPastedImage()">전송</button>
    <button class="btn-cancel" onclick="cancelPaste()">취소</button>
  </div>
</div>

<div id="clip-toast"></div>

<script>
// ttyd가 로드한 후 xterm.js 인스턴스에 접근
var _origOpen = WebSocket.prototype.send;
var _term = null;
var _pendingImageData = null;

// xterm 터미널 인스턴스 감지 (ttyd가 생성한 것을 후킹)
function findTerminal() {
  var el = document.getElementById('terminal');
  if (el && el.querySelector('.xterm-screen')) {
    // xterm 인스턴스를 DOM에서 추출
    var xtermEl = el.querySelector('.xterm');
    if (xtermEl && xtermEl._core) {
      return xtermEl._core;
    }
  }
  return null;
}

// ─── Ctrl+C (선택 영역 있으면 복사, 없으면 SIGINT) ───
document.addEventListener('keydown', function(e) {
  if (e.ctrlKey && e.key === 'c' && !e.shiftKey && !e.altKey) {
    var sel = window.getSelection().toString();
    if (sel.length > 0) {
      e.preventDefault();
      e.stopPropagation();
      navigator.clipboard.writeText(sel).then(function() {
        showToast('복사됨');
      }).catch(function() {
        // fallback
        document.execCommand('copy');
        showToast('복사됨');
      });
      return false;
    }
    // 선택 없으면 기본 동작 (SIGINT)
  }
}, true);

// ─── Ctrl+V (클립보드 텍스트 붙여넣기) ───
document.addEventListener('keydown', function(e) {
  if (e.ctrlKey && e.key === 'v' && !e.shiftKey && !e.altKey) {
    e.preventDefault();
    e.stopPropagation();
    navigator.clipboard.read().then(function(items) {
      for (var i = 0; i < items.length; i++) {
        var item = items[i];
        // 이미지 확인
        var imgType = item.types.find(function(t) { return t.startsWith('image/'); });
        if (imgType) {
          item.getType(imgType).then(function(blob) {
            handleImagePaste(blob);
          });
          return;
        }
        // 텍스트
        if (item.types.includes('text/plain')) {
          item.getType('text/plain').then(function(blob) {
            blob.text().then(function(text) {
              pasteTextToTerminal(text);
            });
          });
          return;
        }
      }
    }).catch(function() {
      // clipboard.read() 불가 시 readText fallback
      navigator.clipboard.readText().then(function(text) {
        pasteTextToTerminal(text);
      }).catch(function() {
        showToast('클립보드 접근 권한이 필요합니다');
      });
    });
    return false;
  }
}, true);

// ─── 이미지 붙여넣기 (Ctrl+V 또는 paste 이벤트) ───
document.addEventListener('paste', function(e) {
  var items = e.clipboardData && e.clipboardData.items;
  if (!items) return;
  for (var i = 0; i < items.length; i++) {
    if (items[i].type.indexOf('image') !== -1) {
      e.preventDefault();
      var blob = items[i].getAsFile();
      handleImagePaste(blob);
      return;
    }
  }
});

function handleImagePaste(blob) {
  var reader = new FileReader();
  reader.onload = function(e) {
    _pendingImageData = e.target.result; // base64 data URL
    var preview = document.getElementById('paste-preview');
    document.getElementById('paste-img').src = _pendingImageData;
    preview.style.display = 'block';
  };
  reader.readAsDataURL(blob);
}

function sendPastedImage() {
  if (!_pendingImageData) return;
  // base64 데이터를 파일로 저장 후 Claude에게 전달
  var base64 = _pendingImageData.split(',')[1];
  var filename = 'pasted-image-' + Date.now() + '.png';

  // 터미널에 명령 입력: base64 디코딩 → 파일 저장 → Claude에게 알림
  var cmd = 'echo "' + base64 + '" | base64 -d > /tmp/' + filename +
            ' && echo "[이미지 저장됨: /tmp/' + filename + ']"';
  pasteTextToTerminal(cmd + '\n');

  cancelPaste();
  showToast('이미지 저장: /tmp/' + filename);
}

function cancelPaste() {
  document.getElementById('paste-preview').style.display = 'none';
  _pendingImageData = null;
}

function pasteTextToTerminal(text) {
  // ttyd WebSocket을 통해 텍스트 전송
  // ttyd 프로토콜: '0' + data (input)
  var ws = document.querySelector('#terminal .xterm');
  if (ws && ws._core && ws._core._coreService) {
    // xterm.js paste API 사용
    ws._core._coreService.triggerDataEvent(text, true);
  } else {
    // fallback: 직접 WebSocket 전송
    var sockets = performance.getEntriesByType ? null : null;
    // ttyd는 전역 WebSocket을 사용 — ttyd의 전역 객체 접근
    if (window.tty_send) {
      window.tty_send(text);
    } else {
      // 최후 수단: execCommand
      var textarea = document.createElement('textarea');
      textarea.value = text;
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('paste');
      document.body.removeChild(textarea);
    }
  }
}

function showToast(msg) {
  var t = document.getElementById('clip-toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(function() { t.style.display = 'none'; }, 2000);
}

// ─── 모드 선택 바 ─────────────────────────────────────────────
// fileserver.py(포트 8080) 의 /api/set-mode 로 POST.
// Ingress가 /files/{HOSTNAME}/ → pod:8080/ 으로 라우팅하므로
// 현재 window.location 에서 /terminal/ → /files/ 로 치환해 호출.
function getFileserverBase() {
  // 예: /terminal/claude-terminal-n1102359/  →  /files/claude-terminal-n1102359/
  var p = window.location.pathname.replace(/\/terminal\//, '/files/');
  // 마지막 슬래시 보정
  if (!p.endsWith('/')) p += '/';
  return p;
}

function requestModeChange(mode) {
  var modal = document.getElementById('mode-modal');
  var desc = document.getElementById('mode-modal-desc');
  var confirm = document.getElementById('mode-modal-confirm');
  if (mode === '1') {
    desc.textContent = '답변만 받기 모드로 전환합니다. 진행 과정 로그는 표시되지 않고 최종 답변만 나옵니다.';
  } else {
    desc.textContent = '진행 과정 자세히 보기 모드로 전환합니다. 도구 호출/사고 과정이 모두 표시됩니다.';
  }
  confirm.onclick = function() { applyModeChange(mode); };
  modal.classList.add('active');
}

function closeModeModal() {
  document.getElementById('mode-modal').classList.remove('active');
}

// ─── 새 터미널 탭 열기 ─────────────────────────────────────────
// 같은 URL로 새 창을 열어 같은 Pod의 ttyd에 추가 연결을 맺는다.
// max-clients=3 초과 시 ttyd가 자동으로 거부 (브라우저에 안내 표시).
function openNewTerminal() {
  window.open(window.location.href, '_blank', 'noopener,noreferrer');
}

// ─── 탭 가시성 신호 → Pod 유휴 판정 정밀화 ─────────────────────
// 브라우저 탭이 가려지면 fileserver.py에 상태 전송 → Pod 내부에 플래그 파일 생성.
// entrypoint.sh heartbeat 루프가 플래그 존재 시 heartbeat skip → idle_timeout(30분)
// 경과 시 Pod 자동 종료. 다시 탭이 보이면 heartbeat 재개.
(function() {
  function sendVisibility(state) {
    try {
      var base = getFileserverBase();
      fetch(base + 'api/visibility', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ state: state }),
        keepalive: true  // 탭 전환/종료 시에도 전송 보장
      }).catch(function() { /* 네트워크 오류 무시 */ });
    } catch (e) { /* ignore */ }
  }

  document.addEventListener('visibilitychange', function() {
    sendVisibility(document.visibilityState === 'hidden' ? 'hidden' : 'visible');
  });

  // 초기 상태 1회 동기화 (페이지 로드 시 보이는 상태가 기본)
  if (document.visibilityState === 'visible') {
    sendVisibility('visible');
  }

  // 언로드 시 hidden 전송 — 브라우저 닫기에도 대응 (keepalive)
  window.addEventListener('pagehide', function() { sendVisibility('hidden'); });
})();

function applyModeChange(mode) {
  var base = getFileserverBase();
  fetch(base + 'api/set-mode', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ mode: mode })
  }).then(function(res) {
    if (!res.ok) {
      showToast('모드 변경 실패 (HTTP ' + res.status + ')');
      return;
    }
    showToast('모드를 변경했습니다. 새로고침 중...');
    setTimeout(function() { window.location.reload(); }, 600);
  }).catch(function(err) {
    showToast('네트워크 오류: ' + err.message);
  });
}
</script>
</body>
</html>
