# 로컬용 ServiceAccount — IRSA 없이 동작
apiVersion: v1
kind: ServiceAccount
metadata:
  name: claude-terminal-sa
  namespace: claude-sessions
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: platform-admin-sa
  namespace: platform
---
# auth-gateway가 claude-sessions 네임스페이스의 Pod/Service/Ingress를 관리할 수 있도록
# 상용(platform/rbac.yaml)과 동일한 최소 권한 원칙 적용
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: local-pod-manager
rules:
  # Pod과 Service 관리: 사용자 세션 생성/삭제/조회
  - apiGroups: [""]
    resources: ["pods", "services"]
    verbs: ["get", "list", "create", "delete"]
  # Pod exec: 토큰 수집 + 유휴 체커에서 Pod 내부 상태 확인
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create", "get"]
  # Ingress 관리: 사용자 Pod에 대한 URL 라우팅 규칙 생성
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "create", "delete"]
  # Secrets 관리: 사용자별 AWS 임시 자격증명(STS 토큰)을 K8s Secret으로 저장
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "delete"]
  # PersistentVolume/PersistentVolumeClaim 관리: EFS Access Point 연동
  - apiGroups: [""]
    resources: ["persistentvolumes", "persistentvolumeclaims"]
    verbs: ["get", "list", "create", "delete"]
  # Node 조회: infrastructure 대시보드에서 노드 현황 표시
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: local-pod-manager-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: local-pod-manager
subjects:
  - kind: ServiceAccount
    name: platform-admin-sa
    namespace: platform
