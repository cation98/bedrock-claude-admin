# 로컬용 ServiceAccount — IRSA 없이 동작
apiVersion: v1
kind: ServiceAccount
metadata:
  name: claude-terminal-sa
  namespace: claude-sessions
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: platform-admin-sa
  namespace: platform
---
# auth-gateway가 claude-sessions 네임스페이스의 Pod/Service/Ingress를 관리할 수 있도록
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: local-pod-manager
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/exec", "pods/log", "services", "configmaps", "secrets"]
    verbs: ["*"]
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale"]
    verbs: ["*"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["*"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: local-pod-manager-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: local-pod-manager
subjects:
  - kind: ServiceAccount
    name: default
    namespace: platform
  - kind: ServiceAccount
    name: platform-admin-sa
    namespace: platform
