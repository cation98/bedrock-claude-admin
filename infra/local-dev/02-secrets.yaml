# 로컬 개발용 시크릿 — 실제 값은 로컬 DB/Redis를 가리킴
# 프로덕션에서는 AWS Secrets Manager + ExternalSecret으로 관리하지만
# 로컬에서는 plaintext(stringData)로 직접 설정
apiVersion: v1
kind: Secret
metadata:
  name: auth-gateway-secrets
  namespace: platform
type: Opaque
stringData:
  # 로컬 PostgreSQL 연결 (01-postgresql.yaml의 local-db)
  DATABASE_URL: "postgresql://bedrock_admin:local-dev-password@local-db.platform.svc.cluster.local:5432/bedrock_platform"
  # JWT 서명 키 — 로컬 전용, 프로덕션에서는 반드시 다른 값 사용
  JWT_SECRET_KEY: "local-dev-jwt-secret-key-not-for-production"
  # 로컬 Redis 연결 (02-redis.yaml)
  REDIS_URL: "redis://redis.platform.svc.cluster.local:6379/0"
  # 테스트 사용자 로그인 허용 — SSO 없이 로컬 테스트 가능
  ALLOW_TEST_USERS: "true"
  # SSO 설정 — 로컬에서는 placeholder (ALLOW_TEST_USERS=true로 우회 가능)
  SSO_AUTH_URL: "https://sso.skons.net/OAuth/Token"
  SSO_AUTH_URL2: "https://sso.skons.net/OAuth/UserInfo"
  SSO_CLIENT_ID: "placeholder-for-local"
  SSO_CLIENT_SECRET: "placeholder-for-local"
  PW_ENCODING_SALT: "placeholder-for-local"
  # 워크숍/외부 DB — 로컬에서는 ssm-tunnels.sh로 패치
  WORKSHOP_DATABASE_URL: ""
  TANGO_DATABASE_URL: ""
  DOCULOG_DATABASE_URL: ""
  DOCULOG_DB_PASSWORD: ""
  # OnlyOffice JWT — 07-onlyoffice.yaml의 onlyoffice-jwt-secret과 동일한 값
  ONLYOFFICE_JWT_SECRET: "local-dev-onlyoffice-jwt-secret-key"
---
# 사용자 Pod용 RDS credentials (로컬 DB 사용)
apiVersion: v1
kind: Secret
metadata:
  name: rds-credentials
  namespace: claude-sessions
type: Opaque
stringData:
  database-url: "postgresql://bedrock_admin:local-dev-password@local-db.platform:5432/bedrock_platform"
