# 로컬 개발용 시크릿 — 실제 값은 로컬 DB를 가리킴
apiVersion: v1
kind: Secret
metadata:
  name: auth-gateway-secrets
  namespace: platform
type: Opaque
stringData:
  DATABASE_URL: "postgresql://bedrock_admin:local-dev-password@local-db.platform:5432/bedrock_platform"
  JWT_SECRET_KEY: "local-dev-jwt-secret-key-not-for-production"
  SSO_AUTH_URL: "https://sso.skons.net/OAuth/Token"
  SSO_AUTH_URL2: "https://sso.skons.net/OAuth/UserInfo"
  SSO_CLIENT_ID: "placeholder-for-local"
  SSO_CLIENT_SECRET: "placeholder-for-local"
  PW_ENCODING_SALT: "placeholder-for-local"
  WORKSHOP_DATABASE_URL: ""
  TANGO_DATABASE_URL: ""
  DOCULOG_DB_PASSWORD: ""
---
# 사용자 Pod용 RDS credentials (로컬 DB 사용)
apiVersion: v1
kind: Secret
metadata:
  name: rds-credentials
  namespace: claude-sessions
type: Opaque
stringData:
  database-url: "postgresql://bedrock_admin:local-dev-password@local-db.platform:5432/bedrock_platform"
