# 로컬 OnlyOffice Document Server — 프로덕션 간소화 버전
#
# 프로덕션과의 차이:
#   - JWT 인증 비활성화 (로컬 테스트 편의)
#   - 리소스 요청량 축소 (Docker Desktop 자원 절약)
#   - liveness/readiness probe 제거 (빠른 시작)
#
# Community Edition 제한: 동시 편집 20명
# AGPL v3 라이선스 — 사내 내부 사용 가능
apiVersion: apps/v1
kind: Deployment
metadata:
  name: onlyoffice
  namespace: claude-sessions
spec:
  replicas: 1
  selector:
    matchLabels:
      app: onlyoffice
  template:
    metadata:
      labels:
        app: onlyoffice
    spec:
      containers:
        - name: onlyoffice
          image: onlyoffice/documentserver:latest
          ports:
            - containerPort: 80
          env:
            # 로컬 개발에서는 JWT 비활성화 — 프로덕션에서는 반드시 true
            - name: JWT_ENABLED
              value: "false"
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
---
# OnlyOffice Service — Ingress에서 onlyoffice.claude-sessions.svc.cluster.local:80 로 접근
apiVersion: v1
kind: Service
metadata:
  name: onlyoffice
  namespace: claude-sessions
spec:
  selector:
    app: onlyoffice
  ports:
    - port: 80
