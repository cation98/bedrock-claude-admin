# 로컬 OnlyOffice Document Server — 상용과 동일 구성
#
# Community Edition 제한: 동시 편집 20명
# AGPL v3 라이선스 — 사내 내부 사용 가능
apiVersion: apps/v1
kind: Deployment
metadata:
  name: onlyoffice
  namespace: claude-sessions
  labels:
    app: onlyoffice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: onlyoffice
  template:
    metadata:
      labels:
        app: onlyoffice
    spec:
      containers:
        - name: onlyoffice
          image: onlyoffice/documentserver:latest
          ports:
            - containerPort: 80
              name: http
          env:
            # 상용과 동일하게 JWT 활성화
            - name: JWT_ENABLED
              value: "true"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: onlyoffice-jwt-secret
                  key: secret
            # K8s 내부 사설 IP 다운로드 허용 — SSRF 방지 기능 해제
            # OnlyOffice는 기본적으로 사설 IP(10.x, 172.x, 192.168.x)로의
            # 파일 다운로드를 차단. K8s 내부 DNS는 사설 IP로 해석되므로 허용 필수.
            - name: ALLOW_PRIVATE_IP_ADDRESS
              value: "true"
            # Inbox JWT 검증 비활성화
            # OnlyOffice JWT는 양방향: browser→OO (config token) + OO→외부 (다운로드 검증)
            # auth-gateway의 파일 응답은 OnlyOffice JWT를 포함하지 않으므로
            # inbox(수신) 방향 검증을 비활성화. browser→OO config 검증은 유지.
            # 주의: JWT_INBOX_ENABLED 환경변수가 local.json을 덮어쓰지 못하므로
            # ONLYOFFICE_DOCS_PARAMS 환경변수로 직접 config 오버라이드.
            - name: JWT_INBOX_ENABLED
              value: "false"
            # local.json 오버라이드: token.enable.request.inbox = false
            - name: ONLYOFFICE_DOCS_PARAMS
              value: '{"services":{"CoAuthoring":{"token":{"enable":{"request":{"inbox":false}}}}}}'
          resources:
            requests:
              cpu: "1000m"
              memory: "2Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /healthcheck
              port: 80
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
          # postStart: entrypoint가 local.json을 생성한 후 inbox JWT를 비활성화
          # OnlyOffice entrypoint가 환경변수(JWT_ENABLED 등)로 local.json을 자체 생성하지만
          # inbox 설정은 환경변수로 제어가 안 되므로 postStart에서 직접 패치
          lifecycle:
            postStart:
              exec:
                command:
                  - bash
                  - -c
                  - |
                    sleep 5
                    python3 -c "
                    import json,time
                    for i in range(10):
                        try:
                            with open('/etc/onlyoffice/documentserver/local.json') as f:
                                cfg = json.load(f)
                            cfg['services']['CoAuthoring']['token']['enable']['request']['inbox'] = False
                            with open('/etc/onlyoffice/documentserver/local.json','w') as f:
                                json.dump(cfg,f,indent=2)
                            print('inbox JWT disabled')
                            break
                        except:
                            time.sleep(2)
                    " && supervisorctl restart ds:docservice 2>/dev/null || true
          volumeMounts:
            - name: data
              mountPath: /var/lib/onlyoffice
      volumes:
        - name: data
          emptyDir: {}
---
# ⚠️ LOCAL DEVELOPMENT ONLY — DO NOT COPY TO PRODUCTION.
# 상용 배포에서는 `infra/k8s/platform/onlyoffice.yaml` 주석 참조 — Secret 을
# 저장소에 커밋하지 않고 운영자가 별도 프로비저닝한다.
apiVersion: v1
kind: Secret
metadata:
  name: onlyoffice-jwt-secret
  namespace: claude-sessions
  annotations:
    local-dev-only: "true"  # CI 가드(scripts/check-no-placeholder.sh) 예외 표시
type: Opaque
stringData:
  # 로컬 Docker Desktop K8s 전용 더미 secret. 외부 노출 없음.
  secret: "local-dev-onlyoffice-jwt-secret-key"
---
# OnlyOffice Service — Ingress에서 onlyoffice.claude-sessions.svc.cluster.local:80 로 접근
apiVersion: v1
kind: Service
metadata:
  name: onlyoffice
  namespace: claude-sessions
spec:
  selector:
    app: onlyoffice
  ports:
    - port: 80
      targetPort: 80
      name: http
  type: ClusterIP
