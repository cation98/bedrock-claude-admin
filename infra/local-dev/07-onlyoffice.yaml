# 로컬 OnlyOffice Document Server — 상용과 동일 구성
#
# Community Edition 제한: 동시 편집 20명
# AGPL v3 라이선스 — 사내 내부 사용 가능
apiVersion: apps/v1
kind: Deployment
metadata:
  name: onlyoffice
  namespace: claude-sessions
  labels:
    app: onlyoffice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: onlyoffice
  template:
    metadata:
      labels:
        app: onlyoffice
    spec:
      containers:
        - name: onlyoffice
          image: onlyoffice/documentserver:latest
          ports:
            - containerPort: 80
              name: http
          env:
            # 상용과 동일하게 JWT 활성화
            - name: JWT_ENABLED
              value: "true"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: onlyoffice-jwt-secret
                  key: secret
          resources:
            requests:
              cpu: "1000m"
              memory: "2Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /healthcheck
              port: 80
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /var/lib/onlyoffice
      volumes:
        - name: data
          emptyDir: {}
---
# OnlyOffice JWT Secret — 로컬 전용 (상용에서는 별도 관리)
apiVersion: v1
kind: Secret
metadata:
  name: onlyoffice-jwt-secret
  namespace: claude-sessions
type: Opaque
stringData:
  secret: "local-dev-onlyoffice-jwt-secret-key"
---
# OnlyOffice Service — Ingress에서 onlyoffice.claude-sessions.svc.cluster.local:80 로 접근
apiVersion: v1
kind: Service
metadata:
  name: onlyoffice
  namespace: claude-sessions
spec:
  selector:
    app: onlyoffice
  ports:
    - port: 80
      targetPort: 80
      name: http
  type: ClusterIP
