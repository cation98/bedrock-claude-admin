# Overprovisioning — 비활성화 (replicas=0)
#
# 1-node-1-pod 모델에서 더미 Pod은 노드 1대 전체를 점유하여 비용 대비 효용이 낮음.
# 사용자 로그인 시 _ensure_node_capacity()가 자동으로 노드를 scale-up하며,
# 초기 대기 2~3분은 1일 1회이므로 허용 가능.
# 워크숍 모드(다수 동시 접속) 필요 시 replicas를 1~3으로 올려 사용.
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: overprovisioning
value: -1
globalDefault: false
description: "사용자 Pod보다 낮은 우선순위. 워크숍 모드에서만 활성화."
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: overprovisioning
  namespace: claude-sessions
spec:
  replicas: 0  # 상시 운영: 0 (비활성). 워크숍 모드: 1~3으로 변경
  selector:
    matchLabels:
      app: overprovisioning
  template:
    metadata:
      labels:
        app: overprovisioning
      annotations:
        cluster-autoscaler.kubernetes.io/safe-to-evict: "true"
    spec:
      priorityClassName: overprovisioning
      terminationGracePeriodSeconds: 0
      nodeSelector:
        role: claude-dedicated
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: overprovisioning
              topologyKey: "kubernetes.io/hostname"
            - labelSelector:
                matchLabels:
                  app: claude-terminal
              topologyKey: "kubernetes.io/hostname"
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.9
          resources:
            requests:
              cpu: 500m
              memory: 1536Mi
            limits:
              cpu: 500m
              memory: 1536Mi
