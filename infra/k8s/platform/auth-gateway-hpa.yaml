apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auth-gateway
  namespace: platform
  labels:
    app: auth-gateway
  annotations:
    # Phase 1b: 50명 상시 운용 대응
    phase1b.bedrock-claude/rationale: "min 2 (HA) / max 4 (Redis TLS 처리 여유 + burst 대응)"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auth-gateway
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300   # 5분간 낮은 부하 유지 시 scale-down (안정성)
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30    # 30초 내 spike 감지 시 빠른 scale-up
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
