# OnlyOffice Document Server — Community Edition
# 공유 클러스터 Deployment (replicas=1, auto-restart)
# Community Edition 제한: 동시 편집 20명
# AGPL v3 라이선스 — 사내 내부 사용 가능, 수정 시 소스 공개 의무
#
# 스토리지: EFS 기반 PVC 사용
#   - Pod 재시작 시 편집 세션/캐시 데이터 보존 (콜백 진행 중 데이터 손실 방지)
#   - ReadWriteMany: 향후 replica 증설 대비
#   - StorageClass: efs-sc (infra/k8s/efs-storage.yaml에서 정의)
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: onlyoffice-data-pvc
  namespace: claude-sessions
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: efs-sc
  resources:
    requests:
      storage: 20Gi  # EFS는 탄력적 용량 — 논리적 값
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: onlyoffice
  namespace: claude-sessions  # 같은 네임스페이스
  labels:
    app: onlyoffice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: onlyoffice
  template:
    metadata:
      labels:
        app: onlyoffice
    spec:
      containers:
      - name: onlyoffice
        # P2-iter3 #2: 태그 pinning — supply-chain risk 차단.
        # 버전 업데이트 시: (1) 릴리스 노트 검증, (2) 이 값 교체, (3) rollout 후
        # `kubectl describe pod` 로 digest 고정 여부 확인.
        image: onlyoffice/documentserver:8.2.2
        ports:
        - containerPort: 80
          name: http
        env:
        - name: JWT_ENABLED
          value: "true"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: onlyoffice-jwt-secret
              key: secret
        # CE 20명 동시 편집 기준 리소스 상향
        # 공식 권고: 세션당 약 100-150MB → 20명 기준 ~3Gi 필요
        resources:
          requests:
            cpu: "1000m"
            memory: "2Gi"
          limits:
            cpu: "2000m"
            memory: "4Gi"
        livenessProbe:
          httpGet:
            path: /healthcheck
            port: 80
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /healthcheck
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        volumeMounts:
        - name: data
          mountPath: /var/lib/onlyoffice
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: onlyoffice-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: onlyoffice
  namespace: claude-sessions
spec:
  selector:
    app: onlyoffice
  ports:
  - port: 80
    targetPort: 80
    name: http
  type: ClusterIP
# ---
# onlyoffice-jwt-secret 은 이 파일에서 관리하지 않는다 (P2-iter3 #1).
# 평문/placeholder 가 저장소에 들어오는 것을 원천 차단하기 위해,
# Secret 리소스는 배포 파이프라인 또는 운영자가 별도 프로비저닝해야 한다.
#
# 상용 프로비저닝 (32자 이상, random):
#   openssl rand -hex 32 | xargs -I{} kubectl -n claude-sessions \
#     create secret generic onlyoffice-jwt-secret --from-literal=secret={}
#
# 검증:
#   kubectl -n claude-sessions get secret onlyoffice-jwt-secret \
#     -o jsonpath='{.data.secret}' | base64 -d | wc -c   # >= 32
#
# 동일 secret 의 auth-gateway 주입은 `infra/k8s/platform/auth-gateway.yaml` 참조.
# 로컬 개발 전용 값은 `infra/local-dev/07-onlyoffice.yaml` 에만 존재.
