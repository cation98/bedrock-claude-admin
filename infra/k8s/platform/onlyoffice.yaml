# OnlyOffice Document Server — Community Edition
# 공유 클러스터 Deployment (replicas=1, auto-restart)
# Community Edition 제한: 동시 편집 20명
# AGPL v3 라이선스 — 사내 내부 사용 가능, 수정 시 소스 공개 의무
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: onlyoffice
  namespace: claude-sessions  # 같은 네임스페이스
  labels:
    app: onlyoffice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: onlyoffice
  template:
    metadata:
      labels:
        app: onlyoffice
    spec:
      containers:
      - name: onlyoffice
        image: onlyoffice/documentserver:latest
        ports:
        - containerPort: 80
          name: http
        env:
        - name: JWT_ENABLED
          value: "true"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: onlyoffice-jwt-secret
              key: secret
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "1000m"
            memory: "2Gi"
        livenessProbe:
          httpGet:
            path: /healthcheck
            port: 80
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /healthcheck
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        volumeMounts:
        - name: data
          mountPath: /var/lib/onlyoffice
      volumes:
      - name: data
        emptyDir: {}  # 비영구 — Pod 재시작 시 캐시 초기화 (문서는 사용자 Pod에 있음)
---
apiVersion: v1
kind: Service
metadata:
  name: onlyoffice
  namespace: claude-sessions
spec:
  selector:
    app: onlyoffice
  ports:
  - port: 80
    targetPort: 80
    name: http
  type: ClusterIP
---
apiVersion: v1
kind: Secret
metadata:
  name: onlyoffice-jwt-secret
  namespace: claude-sessions
type: Opaque
stringData:
  secret: "CHANGE_ME_ONLYOFFICE_JWT_SECRET_32CHARS"  # 배포 시 교체 필요
