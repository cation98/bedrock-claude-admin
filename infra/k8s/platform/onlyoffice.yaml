# OnlyOffice Document Server — Community Edition
# 공유 클러스터 Deployment (replicas=1, auto-restart)
# Community Edition 제한: 동시 편집 20명
# AGPL v3 라이선스 — 사내 내부 사용 가능, 수정 시 소스 공개 의무
#
# 스토리지: emptyDir (OO DS 작업 캐시 — Pod 재시작 시 초기화 무방)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: onlyoffice
  namespace: claude-sessions  # 같은 네임스페이스
  labels:
    app: onlyoffice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: onlyoffice
  template:
    metadata:
      labels:
        app: onlyoffice
    spec:
      # gitea-workers 노드그룹 전용 배치 (dedicated nodegroup taint 회피)
      nodeSelector:
        role: gitea
      tolerations:
        - key: dedicated
          operator: Equal
          value: gitea
          effect: NoSchedule
      # ── SK AI Plugin 주입 (Lane C2 merge, 2026-04-13) ─────────────────────
      # 목적: OnlyOffice 자체 AI 플러그인(SK AI)을 sdkjs-plugins 디렉토리에 주입.
      # 소스: container-image/onlyoffice-plugins/sk-ai/ (git)
      # ConfigMap: scripts/apply-sk-ai-plugin.sh 로 생성 (sk-ai-plugin-meta/src).
      # subPath 마운트로 SK AI 폴더만 주입하여 OO 번들 플러그인 보존.
      initContainers:
      - name: sk-ai-plugin-injector
        image: busybox:1.36
        # busybox는 파일 복사만 수행하는 경량 이미지 (~1MB).
        # ConfigMap에서 파일을 읽어 emptyDir 볼륨에 복사하면
        # OO 컨테이너가 sdkjs-plugins/{UUID}/ 경로로 보게 된다.
        command:
        - sh
        - -c
        - |
          PLUGIN_UUID="asc.{7C4F2E1D-3A5B-4C8E-9D0F-1E2B3C4D5A6F}"
          PLUGIN_DIR="/plugins/${PLUGIN_UUID}"
          mkdir -p "${PLUGIN_DIR}/scripts" "${PLUGIN_DIR}/resources"
          # ConfigMap이 없을 때(optional: true)도 Pod이 기동되도록 조건부 복사
          [ -f /plugin-meta/config.json ] && cp /plugin-meta/config.json "${PLUGIN_DIR}/config.json" || echo "[sk-ai-injector] config.json 없음 — 플러그인 스킵"
          [ -f /plugin-meta/config.js ]   && cp /plugin-meta/config.js   "${PLUGIN_DIR}/config.js"   || true
          [ -f /plugin-src/index.html ]   && cp /plugin-src/index.html   "${PLUGIN_DIR}/index.html"  || true
          [ -f /plugin-src/code.js ]      && cp /plugin-src/code.js      "${PLUGIN_DIR}/scripts/code.js" || true
          echo "[sk-ai-injector] done (plugin files: $(ls ${PLUGIN_DIR} 2>/dev/null | wc -l))"
        volumeMounts:
        - name: sk-ai-plugin-meta
          mountPath: /plugin-meta
          readOnly: true
        - name: sk-ai-plugin-src
          mountPath: /plugin-src
          readOnly: true
        - name: sk-ai-plugin-target
          mountPath: /plugins
      containers:
      - name: onlyoffice
        # P2-iter3 #2: 태그 pinning — supply-chain risk 차단.
        # 버전 업데이트 시: (1) 릴리스 노트 검증, (2) 이 값 교체, (3) rollout 후
        # `kubectl describe pod` 로 digest 고정 여부 확인.
        image: onlyoffice/documentserver:8.2.2
        ports:
        - containerPort: 80
          name: http
        env:
        - name: JWT_ENABLED
          value: "true"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: onlyoffice-jwt-secret
              key: secret

        # ── F1: 사설 IP 다운로드 허용 (H2 수정) ──────────────────────────────
        # OnlyOffice는 기본적으로 사설 IP(10.x, 172.x, 192.168.x)로의
        # 파일 다운로드를 SSRF 방지 목적으로 차단한다.
        # EKS 클러스터 내부 서비스(auth-gateway 등)는 VPC 사설 IP로 해석되므로
        # 이 설정 없이는 OO가 내부 auth-gateway에서 문서를 받아올 수 없다.
        # Word/PPTX는 embedded 리소스를 반복 fetch하므로 Excel보다 더 직접 영향받음.
        # 참고: infra/k8s/platform/network-policy.yaml L304 주석과 짝을 이룸.
        - name: ALLOW_PRIVATE_IP_ADDRESS
          value: "true"

        # ── F2-a: JWT Inbox 검증 비활성화 (H2 수정) ──────────────────────────
        # OnlyOffice JWT는 양방향:
        #   outbox (browser→OO): config JSON token 필드로 검증 → JWT_ENABLED=true 유지
        #   inbox  (OO→외부서버): OO가 파일 다운로드 시 응답 헤더 JWT 검증
        # auth-gateway의 파일 응답은 OnlyOffice 형식 JWT를 포함하지 않으므로
        # inbox 방향 검증을 비활성화해야 파일 로드가 성공한다.
        - name: JWT_INBOX_ENABLED
          value: "false"

        # ── F2-b: local.json 직접 오버라이드 (H2 수정) ───────────────────────
        # JWT_INBOX_ENABLED 환경변수는 OO entrypoint가 local.json을 자체 생성한 후에
        # 적용되지 않을 수 있다(OO 8.x 버그). ONLYOFFICE_DOCS_PARAMS로
        # local.json 설정을 직접 덮어써서 확실하게 inbox 검증을 끈다.
        - name: ONLYOFFICE_DOCS_PARAMS
          value: '{"services":{"CoAuthoring":{"token":{"enable":{"request":{"inbox":false}}}}}}'

        # CE 20명 동시 편집 기준 리소스 상향
        # 공식 권고: 세션당 약 100-150MB → 20명 기준 ~3Gi 필요
        resources:
          requests:
            cpu: "1000m"
            memory: "2Gi"
          limits:
            cpu: "2000m"
            memory: "4Gi"
        livenessProbe:
          httpGet:
            path: /healthcheck
            port: 80
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /healthcheck
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        # ── F2-c: postStart — OO DS 9.x 완전 패치 ───────────────────────────
        # OO DS 9.x에서 환경변수(ALLOW_PRIVATE_IP_ADDRESS, JWT_INBOX_ENABLED 등)가
        # local.json에 미적용되는 버그가 있어 postStart에서 직접 패치한다.
        #
        # 패치 항목:
        #   local.json:
        #     1. inbox JWT 검증 비활성화 — auth-gateway 파일 응답에 JWT 미포함
        #     2. allowPrivateIPAddress=true — callback URL(172.20.x.x ClusterIP) 허용
        #     3. blockPrivateIP=false — externalRequest 사설 IP 차단 해제
        #   nginx ds.conf:
        #     4. $the_scheme=https, $the_host=claude.skons.net 하드코딩
        #        — OO DS가 캐시/콜백 URL을 https://claude.skons.net/... 으로 생성
        #        — Mixed Content(http:// vs https:// 페이지) 차단 방지
        #
        # 흐름:
        #   1. OO entrypoint → local.json 생성, nginx 기동
        #   2. postStart(sleep 10) → local.json + ds.conf 패치
        #   3. nginx reload + docservice 재시작 → 즉시 반영
        lifecycle:
          postStart:
            exec:
              command:
                - bash
                - -c
                - |
                  sleep 10
                  # ── 1. local.json 패치 ──────────────────────────────────────
                  python3 -c "
                  import json, time
                  for i in range(15):
                      try:
                          p = '/etc/onlyoffice/documentserver/local.json'
                          with open(p) as f:
                              cfg = json.load(f)
                          # inbox JWT 검증 비활성화
                          ca = cfg.setdefault('services', {}).setdefault('CoAuthoring', {})
                          ca.setdefault('token', {}).setdefault('enable', {}).setdefault('request', {})['inbox'] = False
                          # Private IP 허용 (callback URL: 172.20.x.x ClusterIP)
                          ca.setdefault('request-filtering-agent', {})['allowPrivateIPAddress'] = True
                          ca['request-filtering-agent']['allowMetaIPAddress'] = True
                          # externalRequest blockPrivateIP 해제
                          cfg.setdefault('externalRequest', {}).setdefault('action', {})['blockPrivateIP'] = False
                          with open(p, 'w') as f:
                              json.dump(cfg, f, indent=2)
                          print('local.json patched: inbox=false, allowPrivateIP=true, blockPrivateIP=false')
                          break
                      except Exception as e:
                          print(f'retry {i}: {e}')
                          time.sleep(2)
                  " 2>&1
                  # ── 2. nginx scheme 오버라이드 — 별도 include 파일로 주입 ────
                  # ds.conf는 이미 "include /etc/nginx/includes/ds-*.conf;"를 포함.
                  # ds-scheme.conf를 추가하면 server 블록에서 자동 로드됨.
                  # 이 방식은 ds.conf 수정 없이 안전하게 변수를 오버라이드한다.
                  # echo "..." 내부에서 \$var 로 쓰면 bash가 $var로 그대로 전달.
                  printf 'set $the_scheme https;\nset $the_host claude.skons.net;\n' \
                    > /etc/nginx/includes/ds-scheme.conf
                  echo "ds-scheme.conf written: $(cat /etc/nginx/includes/ds-scheme.conf)"
                  nginx -t 2>&1 && nginx -s reload 2>&1
                  # ── 3. docservice 재시작 — 변경사항 즉시 반영 ──────────────
                  supervisorctl restart ds:docservice 2>/dev/null
                  echo "OO DS 9.x patch complete"
        volumeMounts:
        - name: data
          mountPath: /var/lib/onlyoffice
        # SK AI 플러그인 폴더를 OO sdkjs-plugins 하위에 마운트 (subPath로 다른 플러그인 보존)
        - name: sk-ai-plugin-target
          mountPath: /var/www/onlyoffice/documentserver/sdkjs-plugins/asc.{7C4F2E1D-3A5B-4C8E-9D0F-1E2B3C4D5A6F}
          subPath: asc.{7C4F2E1D-3A5B-4C8E-9D0F-1E2B3C4D5A6F}
      volumes:
      - name: data
        emptyDir: {}  # OO DS 작업 데이터 (캐시, 임시파일) — Pod 재시작 시 초기화 무관
      # SK AI plugin ConfigMaps (scripts/apply-sk-ai-plugin.sh 로 생성됨)
      - name: sk-ai-plugin-meta
        configMap:
          name: sk-ai-plugin-meta
          optional: true   # ConfigMap 없어도 OO는 기동 (플러그인만 누락)
      - name: sk-ai-plugin-src
        configMap:
          name: sk-ai-plugin-src
          optional: true
      # initContainer가 ConfigMap 파일을 이쪽에 복사, OO 컨테이너가 subPath로 읽음
      - name: sk-ai-plugin-target
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: onlyoffice
  namespace: claude-sessions
spec:
  selector:
    app: onlyoffice
  ports:
  - port: 80
    targetPort: 80
    name: http
  type: ClusterIP
# ---
# onlyoffice-jwt-secret 은 이 파일에서 관리하지 않는다 (P2-iter3 #1).
# 평문/placeholder 가 저장소에 들어오는 것을 원천 차단하기 위해,
# Secret 리소스는 배포 파이프라인 또는 운영자가 별도 프로비저닝해야 한다.
#
# 상용 프로비저닝 (32자 이상, random):
#   openssl rand -hex 32 | xargs -I{} kubectl -n claude-sessions \
#     create secret generic onlyoffice-jwt-secret --from-literal=secret={}
#
# 검증:
#   kubectl -n claude-sessions get secret onlyoffice-jwt-secret \
#     -o jsonpath='{.data.secret}' | base64 -d | wc -c   # >= 32
#
# 동일 secret 의 auth-gateway 주입은 `infra/k8s/platform/auth-gateway.yaml` 참조.
# 로컬 개발 전용 값은 `infra/local-dev/07-onlyoffice.yaml` 에만 존재.
