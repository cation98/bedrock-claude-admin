# =============================================================================
# Auth Gateway — K8s Deployment + Service
# EKS 클러스터 내에서 SSO 인증 + Pod 관리 + 로그인 페이지 서빙
# =============================================================================

apiVersion: v1
kind: Namespace
metadata:
  name: platform
  labels:
    app: bedrock-claude-platform

---
# Auth Gateway Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-gateway
  namespace: platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-gateway
  template:
    metadata:
      labels:
        app: auth-gateway
    spec:
      serviceAccountName: platform-admin-sa
      # 시스템 노드에 고정
      nodeSelector:
        role: system
      tolerations:
        - key: "dedicated"
          operator: "Equal"
          value: "system"
          effect: "NoSchedule"
      # auth-gateway HA: 서로 다른 노드 + ingress-nginx와 같은 노드 페어링
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - auth-gateway
              topologyKey: kubernetes.io/hostname
        podAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - ingress-nginx
                topologyKey: kubernetes.io/hostname
      containers:
        - name: auth-gateway
          image: 680877507363.dkr.ecr.ap-northeast-2.amazonaws.com/bedrock-claude/auth-gateway:latest
          ports:
            - containerPort: 8000
            - containerPort: 3128
          env:
            # ── Secrets (from K8s Secret: auth-gateway-secrets) ──
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: auth-gateway-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: auth-gateway-secrets
                  key: JWT_SECRET_KEY
            - name: SSO_AUTH_URL
              valueFrom:
                secretKeyRef:
                  name: auth-gateway-secrets
                  key: SSO_AUTH_URL
            - name: SSO_AUTH_URL2
              valueFrom:
                secretKeyRef:
                  name: auth-gateway-secrets
                  key: SSO_AUTH_URL2
            - name: SSO_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: auth-gateway-secrets
                  key: SSO_CLIENT_ID
            - name: SSO_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-gateway-secrets
                  key: SSO_CLIENT_SECRET
            - name: PW_ENCODING_SALT
              valueFrom:
                secretKeyRef:
                  name: auth-gateway-secrets
                  key: PW_ENCODING_SALT
            - name: WORKSHOP_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: auth-gateway-secrets
                  key: WORKSHOP_DATABASE_URL
            - name: TANGO_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: auth-gateway-secrets
                  key: TANGO_DATABASE_URL

            # ── OnlyOffice JWT Secret (필수 — placeholder 시 앱 시작 실패) ──
            - name: ONLYOFFICE_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: onlyoffice-jwt-secret
                  key: secret

            # ── Non-secret SSO config ──
            - name: SSO_AUTH_METHOD
              value: "4302010"
            - name: SSO_SCOPES
              value: NeosOAuth
            - name: SSO_TOKEN_KEY
              value: RequestTokenResult

            # ── Kubernetes (EKS 내부에서 실행) ──
            - name: K8S_IN_CLUSTER
              value: "true"
            - name: K8S_NAMESPACE
              value: claude-sessions
            - name: K8S_POD_IMAGE
              value: 680877507363.dkr.ecr.ap-northeast-2.amazonaws.com/bedrock-claude/claude-code-terminal:latest
            - name: K8S_SERVICE_ACCOUNT
              value: claude-terminal-sa

            # ── Bedrock ──
            - name: BEDROCK_REGION
              value: ap-northeast-2
            - name: BEDROCK_SONNET_MODEL
              value: global.anthropic.claude-sonnet-4-6
            - name: BEDROCK_HAIKU_MODEL
              value: global.anthropic.claude-haiku-4-5-20251001-v1:0

          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

---
apiVersion: v1
kind: Service
metadata:
  name: auth-gateway
  namespace: platform
spec:
  selector:
    app: auth-gateway
  ports:
    # FastAPI (Auth Gateway API)
    - name: http
      port: 80
      targetPort: 8000
    # CONNECT 프록시 — Pod에서 외부 API 접근 시 사용
    - name: proxy
      port: 3128
      targetPort: 3128
