# =============================================================================
# EFS Access Points — 사용자별 파일시스템 격리 템플릿
# =============================================================================
#
# EFS(Elastic File System)란?
# ─────────────────────────────
# AWS의 관리형 NFS 파일시스템. 여러 Pod이 동시에 같은 스토리지를 마운트할 수
# 있다 (ReadWriteMany). 사용자 작업 파일(코드, 설정 등)을 Pod 재시작 후에도
# 유지하기 위해 사용한다.
#
# EFS Access Point란?
# ─────────────────────
# EFS 파일시스템에 대한 "가상 루트 디렉토리"이자 "UID/GID 강제 적용 게이트웨이".
# 각 사용자에게 독립된 Access Point를 생성하면:
# 1. 격리: /workspaces/{username} 경로만 접근 가능 (다른 사용자 디렉토리 불가)
# 2. 권한 강제: Pod 내 UID/GID가 무엇이든 항상 uid=1000, gid=1000으로 덮어씀
#              (node 사용자 권한으로 파일 소유권 통일)
# 3. 자동 디렉토리 생성: RootDirectory가 없으면 자동으로 생성
#
# 생성 방식 (동적 생성)
# ─────────────────────
# 이 YAML 파일은 참고용 템플릿이다. 실제 Access Point는 kubectl apply로
# 생성하지 않고, k8s_service.py가 boto3로 사용자 세션 생성 시 동적으로 만든다.
#
# 관련 코드: auth-gateway/app/services/k8s_service.py
# 함수: create_user_pod() 내부에서 아래 순서로 실행:
#
#   1. efs.create_access_point(
#          FileSystemId='fs-XXXXXXXX',
#          PosixUser={'Uid': 1000, 'Gid': 1000},
#          RootDirectory={
#              'Path': f'/workspaces/{username}',
#              'CreationInfo': {
#                  'OwnerUid': 1000,
#                  'OwnerGid': 1000,
#                  'Permissions': '755'
#              }
#          },
#          Tags=[{'Key': 'username', 'Value': username}]
#      )
#   2. 반환된 AccessPointId(fsap-YYYYYYYY)를 Pod spec에 주입
#   3. Pod volumeHandle: "fs-XXXXXXXX::fsap-YYYYYYYY" 형식으로 마운트
#
# =============================================================================

# =============================================================================
# 예시: PersistentVolume + PersistentVolumeClaim (실제 사용 금지)
# =============================================================================
# 아래 예시는 구조 이해를 위한 참고용이다.
# 실제 PV/PVC는 k8s_service.py가 Pod 생성 시 함께 동적으로 생성한다.
# kubectl apply -f 로 직접 적용하지 말 것.

# --- PersistentVolume 예시 ---
# apiVersion: v1
# kind: PersistentVolume
# metadata:
#   name: efs-pv-username          # 실제: efs-pv-{username}
#   labels:
#     username: example-user
# spec:
#   capacity:
#     storage: 10Gi                # EFS는 실제로 용량 제한이 없으나 명시 필요
#   volumeMode: Filesystem
#   accessModes:
#     - ReadWriteMany              # 여러 Pod이 동시 마운트 가능 (EFS 특성)
#   persistentVolumeReclaimPolicy: Retain  # Pod 삭제 후 데이터 보존
#   storageClassName: efs-sc
#   csi:
#     driver: efs.csi.aws.com
#     # volumeHandle 형식: {EFS_FILE_SYSTEM_ID}::{ACCESS_POINT_ID}
#     # "::" 구분자로 EFS ID와 Access Point ID를 연결
#     volumeHandle: fs-XXXXXXXX::fsap-YYYYYYYY
#     volumeAttributes:
#       encryptInTransit: "true"   # 전송 중 암호화 (TLS)

# --- PersistentVolumeClaim 예시 ---
# apiVersion: v1
# kind: PersistentVolumeClaim
# metadata:
#   name: efs-pvc-username         # 실제: efs-pvc-{username}
#   namespace: claude-sessions
# spec:
#   accessModes:
#     - ReadWriteMany
#   storageClassName: efs-sc
#   resources:
#     requests:
#       storage: 10Gi
#   selector:
#     matchLabels:
#       username: example-user     # 위 PV와 매핑

# =============================================================================
# StorageClass — EFS CSI 드라이버 설정
# =============================================================================
# StorageClass는 한 번만 생성하면 클러스터 전체에서 재사용.
# kubectl apply -f efs-access-points.yaml 시 이 부분만 실제 적용됨.
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: efs-sc
  annotations:
    # 관리자만 사용하는 StorageClass (자동 프로비저닝 비활성화)
    storageclass.kubernetes.io/is-default-class: "false"
provisioner: efs.csi.aws.com
parameters:
  # provisioningMode: efs-ap → Access Point 기반 동적 프로비저닝
  # k8s_service.py가 Access Point를 직접 생성하므로 여기서는 참고용
  provisioningMode: efs-ap
  fileSystemId: fs-XXXXXXXX          # 실제 EFS ID로 교체 필요 (Terraform output)
  directoryPerms: "755"              # 생성되는 디렉토리 권한
  uid: "1000"                        # node 사용자 UID (컨테이너 이미지 기준)
  gid: "1000"                        # node 사용자 GID
reclaimPolicy: Retain                # 세션 종료 후 데이터 유지 (사용자 작업 보존)
volumeBindingMode: Immediate
mountOptions:
  - tls                              # EFS 마운트 시 TLS 암호화 강제
  - iam                              # IAM 기반 인증 (EFS 액세스 정책 연동)

# =============================================================================
# 사용 흐름 요약
# =============================================================================
#
# 사용자 세션 시작 시:
# ┌─────────────────────────────────────────────────────────────────┐
# │ 1. k8s_service.py → boto3.efs.create_access_point()            │
# │    - Path: /workspaces/{username}                               │
# │    - PosixUser: uid=1000, gid=1000                              │
# │    - 반환: fsap-YYYYYYYY                                        │
# │                                                                 │
# │ 2. k8s_service.py → PersistentVolume 생성                      │
# │    - volumeHandle: fs-XXXXXXXX::fsap-YYYYYYYY                   │
# │                                                                 │
# │ 3. k8s_service.py → PersistentVolumeClaim 생성                 │
# │                                                                 │
# │ 4. k8s_service.py → Pod 생성                                   │
# │    - volumes: [{name: workspace, persistentVolumeClaim: ...}]   │
# │    - volumeMounts: [{mountPath: /home/node/workspace, ...}]     │
# └─────────────────────────────────────────────────────────────────┘
#
# 사용자 세션 종료 시:
# ┌─────────────────────────────────────────────────────────────────┐
# │ 1. Pod 삭제 (작업 파일은 EFS에 남아있음)                        │
# │ 2. PVC/PV는 Retain → 데이터 보존 (다음 세션에서 재사용 가능)   │
# │ 3. Access Point는 유지 (사용자가 재접속 시 같은 AP 재사용)      │
# └─────────────────────────────────────────────────────────────────┘
