# Auth Gateway가 claude-sessions 네임스페이스의 Pod을 관리할 수 있는 권한
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: auth-gateway-pod-manager
rules:
  - apiGroups: [""]
    resources: ["pods", "services"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "create", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: auth-gateway-pod-manager-binding
subjects:
  - kind: ServiceAccount
    name: default
    namespace: platform
roleRef:
  kind: ClusterRole
  name: auth-gateway-pod-manager
  apiGroup: rbac.authorization.k8s.io
