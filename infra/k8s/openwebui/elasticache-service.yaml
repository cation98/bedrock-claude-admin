# =============================================================================
# ElastiCache ExternalName Service — openwebui 네임스페이스
#
# 목적:
#   AWS ElastiCache Redis는 K8s Pod가 아니므로 podSelector로 지정 불가.
#   ExternalName Service를 사용하면 클러스터 내부에서 안정적인 DNS 이름으로
#   ElastiCache에 접근할 수 있어 REDIS_URL 환경변수 통일이 가능하다.
#
# 사용 시 REDIS_URL:
#   redis://elasticache-redis.openwebui.svc.cluster.local:6379/0
#
# 주의사항:
#   - ExternalName은 CNAME 해석 → 실제 TCP 연결은 ElastiCache IP로 이루어짐
#   - NetworkPolicy ipBlock은 여전히 필요 (L3 레벨 제어)
#   - T2 terraform apply 후 primary_endpoint_address 출력값으로 externalName 교체
#
# 적용:
#   T2 terraform output redis_primary_endpoint 확인 후:
#   kubectl apply -f infra/k8s/openwebui/elasticache-service.yaml
# =============================================================================

# ----- Primary (쓰기) 엔드포인트 -----
# Pipelines(usage_emit), Bedrock AG가 XADD/SET 시 사용
apiVersion: v1
kind: Service
metadata:
  name: elasticache-redis
  namespace: openwebui
  annotations:
    # T2 apply 후 terraform output으로 확인한 실제 endpoint로 교체
    bedrock-platform/endpoint-source: "terraform output redis_primary_endpoint"
spec:
  type: ExternalName
  # ⚠️  placeholder: T2 apply 후 실제 endpoint로 교체 필요
  # 예시: bedrock-claude-redis.xxxxxx.ng.0001.apse2.cache.amazonaws.com
  externalName: PLACEHOLDER_REPLACE_WITH_TERRAFORM_OUTPUT
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP

---
# ----- Reader (선택적 읽기) 엔드포인트 -----
# 향후 읽기 전용 쿼리 분리 시 사용 (Phase 1)
# auth-gateway jti 블랙리스트 EXISTS 조회 시 reader 활용 가능
apiVersion: v1
kind: Service
metadata:
  name: elasticache-redis-reader
  namespace: openwebui
  annotations:
    bedrock-platform/endpoint-source: "terraform output redis_reader_endpoint"
spec:
  type: ExternalName
  # ⚠️  placeholder: T2 apply 후 실제 endpoint로 교체 필요
  externalName: PLACEHOLDER_REPLACE_WITH_TERRAFORM_OUTPUT_READER
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
