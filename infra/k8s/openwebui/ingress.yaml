# =============================================================================
# Open WebUI Ingress — chat.skons.net
#
# 라우팅:
#   chat.skons.net/* → open-webui Service (포트 8080)
#
# 보안 핵심:
#   - more_clear_input_headers: 외부 X-SKO-Email/X-SKO-User-Id 위조 차단
#   - Auth Gateway → X-SKO-Email 주입 → Open WebUI trusted_header_auth
#   - 헤더 스푸핑 없으면 외부 공격자는 아무 헤더도 통과시킬 수 없음
#
# 전제 조건:
#   - ingress-nginx Helm values에 allow-snippet-annotations: true 설정 (또는 기본값)
#   - ingress-nginx controller에 headers-more-nginx-module 포함 (기본 포함)
# =============================================================================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: open-webui-ingress
  namespace: openwebui
  annotations:
    # WebSocket/스트리밍 타임아웃 (LLM 응답은 길 수 있음)
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"

    # 스트리밍 응답 버퍼링 비활성화 → TTFT(Time To First Token) 최소화
    nginx.ingress.kubernetes.io/proxy-buffering: "off"

    # WebSocket 활성화 (Open WebUI 실시간 스트리밍)
    nginx.ingress.kubernetes.io/enable-websocket: "true"

    # [SECURITY CRITICAL] Trusted header 스푸핑 방지
    # 외부에서 전달되는 X-SKO-Email / X-SKO-User-Id 헤더를 무조건 제거.
    # Auth Gateway가 JWT 검증 후 내부적으로 헤더를 재주입하므로 정상 플로우 무결.
    # ENABLE_TRUSTED_HEADER_AUTH=true 환경에서 이 annotation 없으면
    # 임의 헤더로 타 사용자 인격 사칭 가능 → CRITICAL regression.
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_clear_input_headers "X-SKO-Email" "X-SKO-User-Id";

    # upstream hash: 같은 사용자는 같은 Open WebUI 인스턴스로 라우팅 (세션 연속성)
    nginx.ingress.kubernetes.io/upstream-hash-by: "$cookie_bedrock_webui_session"

spec:
  ingressClassName: nginx
  rules:
    - host: chat.skons.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: open-webui
                port:
                  number: 8080
