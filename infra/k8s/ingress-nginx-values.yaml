# =============================================================================
# ingress-nginx Helm Values — ingress-workers nodegroup 분리 (T6)
#
# ⚠️  DRAFT: T2 (devops — ingress-workers nodegroup Terraform 적용) 완료 후 실행
#
# 적용 명령:
#   helm upgrade ingress-nginx ingress-nginx/ingress-nginx \
#     -n ingress-nginx --create-namespace \
#     -f infra/k8s/ingress-nginx-values.yaml
#
# 전제 조건 (T2 확인 필요):
#   - nodegroup: ingress-workers 생성 완료
#   - node label: role=ingress 적용됨
#   - node taint: dedicated=ingress:NoSchedule 적용됨
#   - min=2, max=6 Auto Scaling Group 설정 완료
#
# 왜 ingress-workers를 분리하는가?
#   - Open WebUI WebSocket 트래픽 증가 시 ingress 계층만 독립 스케일
#   - auth-gateway(system-node-large)는 항상 2노드 고정, 영향 없음
#   - system nodegroup에서 ingress 부하 제거 → auth-gateway 안정성 향상
# =============================================================================

controller:
  # ──────────────────────────────────────────────────────────────────────────
  # ingress-workers nodegroup에 고정 배치
  # ──────────────────────────────────────────────────────────────────────────

  # ingress-workers 노드에만 스케줄 허용
  nodeSelector:
    role: ingress

  # ingress-workers 노드의 taint 허용 (없으면 Pending 상태)
  tolerations:
    - key: dedicated
      operator: Equal
      value: ingress
      effect: NoSchedule

  # ingress-nginx Pod 간 hard anti-affinity (동일 노드 중복 배치 금지)
  # 노드 장애 시 단일 노드에 몰리는 것을 방지 — HA 필수 요건
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - ingress-nginx
              - key: app.kubernetes.io/component
                operator: In
                values:
                  - controller
          topologyKey: kubernetes.io/hostname

  # ──────────────────────────────────────────────────────────────────────────
  # Open WebUI WebSocket/스트리밍 대응 설정
  # ──────────────────────────────────────────────────────────────────────────
  config:
    # WebSocket 연결 유지 (Open WebUI 스트리밍 토큰 출력)
    proxy-read-timeout: "3600"
    proxy-send-timeout: "3600"
    # HTTP/1.1 업그레이드 헤더 전달 (WebSocket 핸드셰이크)
    proxy-http-version: "1.1"
    # 스트리밍 응답 버퍼링 비활성화 → TTFT(Time To First Token) 최소화
    proxy-buffering: "off"

    # Trusted header 스푸핑 방지 (design doc 필수 보안 요건)
    # 외부 클라이언트가 X-SKO-Email 헤더를 위조하여 인증 우회 차단
    # more_clear_input_headers: nginx-ingress-controller에서 지원
    more-clear-input-headers: "X-SKO-Email X-SKO-User-Id"

  # ──────────────────────────────────────────────────────────────────────────
  # HPA: min=2 (HA) / max=6 (WebSocket 트래픽 대응)
  # ──────────────────────────────────────────────────────────────────────────
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  # 기본 복제본 수 (HPA가 없을 때 fallback)
  replicaCount: 2

  # ──────────────────────────────────────────────────────────────────────────
  # 리소스 요청/한계 (t3.large 기준 — 2 vCPU, 8Gi)
  # ──────────────────────────────────────────────────────────────────────────
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi

  # ──────────────────────────────────────────────────────────────────────────
  # 서비스: LoadBalancer (AWS NLB)
  # ──────────────────────────────────────────────────────────────────────────
  service:
    type: LoadBalancer
    annotations:
      # AWS NLB 사용 (ALB와 달리 L4, WebSocket에 더 적합)
      service.beta.kubernetes.io/aws-load-balancer-type: nlb
      service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
      # 필수 태그 (AWS 리소스 태그 정책)
      service.beta.kubernetes.io/aws-load-balancer-additional-resource-tags: >
        Owner=N1102359,Service=bedrock-claude-platform,Env=prod

  # ──────────────────────────────────────────────────────────────────────────
  # PodDisruptionBudget: 롤링 업데이트/노드 드레인 시 최소 1개 유지
  # ──────────────────────────────────────────────────────────────────────────
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

  # ──────────────────────────────────────────────────────────────────────────
  # 우선순위: kube-system과 동일 수준 (ingress 중단이 전 서비스에 영향)
  # ──────────────────────────────────────────────────────────────────────────
  priorityClassName: system-cluster-critical

  # ──────────────────────────────────────────────────────────────────────────
  # Metrics: Prometheus 스크래핑 활성화 (관리자 대시보드 연동)
  # ──────────────────────────────────────────────────────────────────────────
  metrics:
    enabled: true
    serviceMonitor:
      enabled: false   # Prometheus Operator 없음 → false

# defaultBackend: 기본 404 페이지 (system-node-large에 배치해도 무방)
defaultBackend:
  enabled: true
  nodeSelector:
    role: system
  tolerations:
    - key: dedicated
      operator: Equal
      value: system
      effect: NoSchedule
