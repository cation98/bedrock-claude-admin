# =============================================================================
# ServiceAccount: claude-terminal-sa
#
# ServiceAccount = Pod이 AWS 서비스에 접근할 때 사용하는 "신분증"
#
# IRSA(IAM Roles for Service Accounts) 연동:
#   이 ServiceAccount를 사용하는 Pod은 자동으로
#   Bedrock InvokeModel 권한을 가진 AWS 임시 자격증명을 받음
#
# annotations의 role-arn은 Terraform output의 bedrock_role_arn 값으로 교체
# =============================================================================

apiVersion: v1
kind: ServiceAccount
metadata:
  name: claude-terminal-sa
  namespace: claude-sessions
  annotations:
    # IMPORTANT: Terraform apply 후 실제 ARN으로 교체 필요
    # terraform output bedrock_role_arn 으로 확인
    eks.amazonaws.com/role-arn: "arn:aws:iam::680877507363:role/bedrock-claude-bedrock-access"
  labels:
    app: claude-terminal
