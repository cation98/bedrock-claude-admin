# =============================================================================
# T20 Staging Pod — ANTHROPIC_BASE_URL 활성화 검증용 (일회성)
#
# 목적: T20 proxy (Console Pod → auth-gateway → Bedrock) E2E 검증.
#       이 Pod는 운영 pod-template.yaml을 건드리지 않고 독립적으로 검증한다.
#       검증 완료 후: kubectl delete pod claude-terminal-t20-staging
#
# 사용 시점: §8 Migration sequence T-1h (PR-1·PR-2 머지 + DB 마이그레이션 완료 후)
#
# =============================================================================
# ★ Pre-flight (apply 전 필수 준비)
#
# 1. T20STG K8s Secret 생성 (staging-only — 검증 후 삭제)
#    STAGING_TOKEN=$(openssl rand -hex 32)
#    kubectl -n claude-sessions create secret generic pod-token-t20stg \
#      --from-literal=token="${STAGING_TOKEN}"
#
# 2. Auth Gateway DB에 T20STG 사용자 + 세션 등록
#    psql $DATABASE_URL <<'EOF'
#    -- 사용자 등록 (검증 후 DELETE)
#    INSERT INTO users (username, display_name, email, is_approved, role, created_at)
#    VALUES ('T20STG', 'T20 Staging Verifier', 'T20STG@skons.net', true, 'admin', NOW())
#    ON CONFLICT (username) DO NOTHING;
#
#    -- pod-token 등록 (SHA-256 해시 — Python: hashlib.sha256(STAGING_TOKEN.encode()).hexdigest())
#    -- STAGING_TOKEN_HASH를 실제 해시로 교체 후 실행
#    INSERT INTO terminal_sessions (username, pod_name, pod_token_hash, status, created_at, updated_at)
#    VALUES ('T20STG', 'claude-terminal-t20-staging', '<STAGING_TOKEN_HASH>', 'running', NOW(), NOW());
#    EOF
#
# 3. apply
#    kubectl --context EKS apply -f infra/k8s/pod-template-t20-staging.yaml
#    kubectl --context EKS -n claude-sessions get pod claude-terminal-t20-staging -w
#
# 4. 검증 (30분) — 별도 브라우저 탭에서 터미널 접속 또는 kubectl exec
#    kubectl --context EKS -n claude-sessions port-forward \
#      pod/claude-terminal-t20-staging 7681:7681
#    # 브라우저에서 http://localhost:7681 접속
#
# 5. 검증 완료 후 정리
#    kubectl --context EKS -n claude-sessions delete pod claude-terminal-t20-staging
#    kubectl --context EKS -n claude-sessions delete secret pod-token-t20stg
#    psql $DATABASE_URL -c "DELETE FROM terminal_sessions WHERE username='T20STG';"
#    psql $DATABASE_URL -c "DELETE FROM token_usage_event WHERE username='T20STG';"
#    psql $DATABASE_URL -c "DELETE FROM token_usage_daily WHERE username='T20STG';"
#    psql $DATABASE_URL -c "DELETE FROM users WHERE username='T20STG';"
# =============================================================================

apiVersion: v1
kind: Pod
metadata:
  name: claude-terminal-t20-staging
  namespace: claude-sessions
  labels:
    app: claude-terminal       # idle cleanup 정책 동일 적용 (자동 정리 보장)
    user: t20-staging          # 운영 Pod와 분리 식별
    session-type: t20-staging  # Prometheus / 모니터링 쿼리 분리
    managed-by: manual         # k8s_service.py가 아닌 수동 apply
spec:
  serviceAccountName: claude-terminal-sa  # IRSA: Bedrock 호출 권한 (운영과 동일)

  containers:
    - name: terminal
      image: 680877507363.dkr.ecr.ap-northeast-2.amazonaws.com/bedrock-claude/claude-code-terminal:latest
      imagePullPolicy: Always
      ports:
        - containerPort: 7681
          name: ttyd
        - containerPort: 8080
          name: files

      env:
        # ----- Bedrock -----
        - name: CLAUDE_CODE_SKIP_ONBOARDING
          value: "1"
        - name: CLAUDE_CODE_USE_BEDROCK
          value: "1"
        - name: DISABLE_AUTOUPDATER
          value: "1"
        - name: AWS_REGION
          value: "ap-northeast-2"
        - name: ANTHROPIC_DEFAULT_SONNET_MODEL
          value: "global.anthropic.claude-sonnet-4-6"
        - name: ANTHROPIC_DEFAULT_HAIKU_MODEL
          value: "global.anthropic.claude-haiku-4-5-20251001-v1:0"

        # ----- 사용자 정보 -----
        - name: USER_ID
          value: "T20STG"
        - name: USER_DISPLAY_NAME
          value: "T20 Staging Verifier"
        - name: GIT_USER_NAME
          value: "T20 Staging Verifier"
        - name: GIT_USER_EMAIL
          value: "T20STG@skons.net"
        - name: SECURITY_LEVEL
          value: "standard"

        # ----- 내부 통신 -----
        - name: AUTH_GATEWAY_URL
          value: "http://auth-gateway.platform.svc.cluster.local"

        # ----- DB 접근 (검증 시나리오: psql로 token_usage_event 확인) -----
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: rds-credentials
              key: database-url

        # ----- Pod 내부 API 인증 (pod-token-exchange → JWT) -----
        # Pre-flight 1번에서 생성한 K8s Secret 참조
        - name: SECURE_POD_TOKEN
          valueFrom:
            secretKeyRef:
              name: pod-token-t20stg   # Pre-flight에서 생성 (openssl rand -hex 32)
              key: token

        # ----- ★ T20 proxy 활성화 (이 Pod의 핵심 차이점) -----
        # entrypoint.sh가 이 변수를 감지하면:
        #   1. SECURE_POD_TOKEN으로 pod-token-exchange → JWT 획득
        #   2. ANTHROPIC_AUTH_TOKEN = JWT (Bearer 자동 부착)
        #   3. CLAUDE_CODE_USE_BEDROCK unset → HTTP proxy 모드로 전환
        # 결과: Claude CLI → auth-gateway /v1/messages → Bedrock (IRSA 직접 호출 차단)
        #
        # ※ trailing /v1 없음 — SDK가 /v1/messages를 자동 부착.
        #    /v1을 포함하면 /v1/v1/messages → 404. (k8s_service.py:321 동일)
        - name: ANTHROPIC_BASE_URL
          value: "http://auth-gateway.platform.svc.cluster.local"

      # staging은 전용 노드 불필요 — 운영 Pod보다 가볍게 설정
      resources:
        requests:
          cpu: "200m"
          memory: "512Mi"
        limits:
          cpu: "1000m"
          memory: "2Gi"

      readinessProbe:
        httpGet:
          path: /
          port: 7681
        initialDelaySeconds: 5
        periodSeconds: 10

      livenessProbe:
        httpGet:
          path: /
          port: 7681
        initialDelaySeconds: 10
        periodSeconds: 30

  # staging Pod는 1시간 안에 검증 완료 (초과 시 자동 종료 + cleanup)
  activeDeadlineSeconds: 3600

  # 재시작 없음 (검증용 일회성)
  restartPolicy: Never

  # staging은 system nodegroup 불필요 — user Pod nodegroup에 스케줄
  # (운영자가 전용 노드를 명시하려면 아래 주석 해제)
  # nodeSelector:
  #   role: user
