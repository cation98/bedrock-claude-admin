name: Commit Message Lint

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  commit-lint:
    runs-on: ubuntu-latest
    env:
      BASE_SHA: ${{ github.event.pull_request.base.sha }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit messages
        run: |
          pattern='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-zA-Z0-9_/.\-]+\))?!?: .+'
          fail=0
          while read -r sha; do
              msg=$(git log -1 --pretty=%s "$sha")
              case "$msg" in
                  Merge*|Revert*|"fixup!"*|"squash!"*|"amend!"*) continue ;;
              esac
              if ! echo "$msg" | grep -Eq "$pattern"; then
                  echo "FAIL: $sha — $msg"
                  fail=1
              fi
          done < <(git log --no-merges --format=%H "${BASE_SHA}..${HEAD_SHA}")

          if [ "$fail" -eq 1 ]; then
              echo ""
              echo "Conventional commit 형식 미준수 commit이 존재합니다."
              echo "형식: <type>(<scope>): <subject>"
              exit 1
          fi
          echo "OK: 모든 commit 메시지가 conventional commit 형식 준수."
