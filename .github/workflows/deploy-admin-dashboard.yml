name: deploy admin dashboard to Amplify

on:
  push:
    branches:
      - main
    paths:
      - "admin-dashboard/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Amplify build
        env:
          AMPLIFY_WEBHOOK_URL: ${{ secrets.AMPLIFY_WEBHOOK_URL }}
        run: |
          curl -sS -X POST "$AMPLIFY_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{}'
          echo "Amplify build triggered. Check progress at:"
          echo "https://ap-northeast-2.console.aws.amazon.com/amplify/home#/d3n19scky0a5sa"
