id: ko-006-proofread-spelling
menu: proofread
description: |
  두음법칙(년→연), 사이시옷(갯수→개수), 합성어 띄어쓰기(처리 량→처리량),
  부사형 어미(-히/-이) 등 맞춤법 오류 4개가 포함된 예산 현황 텍스트 교정.

input: |
  이번 프로젝트의 년도별 예산 현황을 정리하면 다음과 같습니다. 작년도에는 총 예산의
  38%를 개발비로 배정하였으나, 올해는 운영비와 인건비의 비중을 늘려 개발비 비율을 25%로
  조정하였습니다. 또한 외부 협력업체와의 계약 갯수도 전년 대비 12개에서 18개로
  증가하였습니다. 신규 업무 프로세스 도입 후 직원들의 업무 효율이 높아져 작업 처리 량이
  전 분기 대비 31% 상승하였고, 오류 발생률은 뚜렷히 감소하였습니다.

expected:
  structural:
    - 교정된 전체 문장 반환
    - 교정 내역 목록 포함
    - 4개 오류 모두 수정
  errors_to_fix:
    - '"년도별" → "연도별" (두음법칙: 어두 ㄴ→ㅇ)'
    - '"갯수" → "개수" (사이시옷: 한자어 합성어에 미적용)'
    - '"처리 량" → "처리량" (합성어 붙여 쓰기)'
    - '"뚜렷히" → "뚜렷이" (어간 끝이 ㅎ 아님 → -이 사용)'
  forbidden:
    - 올바른 표현 수정 금지
    - 원문 수치 변형 금지
    - 문장 구조 임의 변경 금지

rubric:
  - name: 맞춤법 검출률
    max: 5
    guide: 4개 오류 모두 검출 시 5점, 3개 4점, 2개 2점, 1개 이하 1점
  - name: 교정 정확도
    max: 5
    guide: 검출 오류를 정확히 수정하고 오탐 없으면 5점
  - name: 원문 의미 보존
    max: 5
    guide: 수치, 내용 변경 없이 오류만 수정하면 5점

golden: |
  이번 프로젝트의 연도별 예산 현황을 정리하면 다음과 같습니다. 작년도에는 총 예산의
  38%를 개발비로 배정하였으나, 올해는 운영비와 인건비의 비중을 늘려 개발비 비율을 25%로
  조정하였습니다. 또한 외부 협력업체와의 계약 개수도 전년 대비 12개에서 18개로
  증가하였습니다. 신규 업무 프로세스 도입 후 직원들의 업무 효율이 높아져 작업 처리량이
  전 분기 대비 31% 상승하였고, 오류 발생률은 뚜렷이 감소하였습니다.

  [교정 내역]
  1. "년도별" → "연도별" — 두음법칙: 단어 첫 음절의 'ㄴ'은 'ㅇ'으로 발음·표기
  2. "갯수" → "개수" — 사이시옷은 순우리말 합성어에만 적용; 한자어(個數) 합성어는 미적용
  3. "처리 량" → "처리량" — 합성어(處理量)는 붙여 씀
  4. "뚜렷히" → "뚜렷이" — 어간이 'ㅎ'으로 끝나지 않으므로 부사형 어미는 '-이'
