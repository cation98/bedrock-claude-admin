id: ko-005-proofread-grammar
menu: proofread
description: |
  조사 오류(을/를), 불필요한 띄어쓰기, 율/률 혼동 등 6개 문법 오류가 포함된
  분기 성과 보고 텍스트 교정. 교정 내역 명시 여부도 평가함.

input: |
  이번 분기 성과보고서을 검토한 결과, 영업팀에서 목표대비 115%의 실적을 달성 한 것을
  확인하였습니다. 특히 신규 고객 유치에 있어 전분기 대비 28%가 증가하였으며, 기존 고객의
  재계약율도 92%에 달하는 수준으로 향상되었습니다. 이러한 성과는 팀원 전원이 협력하여
  이루어낸 결과로, 각 팀원의 노력과 헌신을 높히 평가합니다. 향후에는 현재의 모멘텀을
  유지하면서 미개척 시장으로의 확장도 추진 할 예정입니다.

expected:
  structural:
    - 교정된 전체 문장 반환
    - 교정 내역 목록 포함 (형식 무관, 원문 → 수정 형태)
    - 6개 오류 모두 수정
  errors_to_fix:
    - '"보고서을" → "보고서를" (목적격 조사 오류)'
    - '"달성 한" → "달성한" (불필요한 띄어쓰기)'
    - '"전분기" → "전 분기" (단위명사 띄어쓰기)'
    - '"재계약율" → "재계약률" (한자어 뒤 율/률 구분)'
    - '"높히" → "높이" (부사형 오류)'
    - '"추진 할" → "추진할" (불필요한 띄어쓰기)'
  forbidden:
    - 원문 의미 변경 금지
    - 문장 구조 임의 재작성 금지
    - 오류가 아닌 표현 수정 금지

rubric:
  - name: 오류 검출률
    max: 5
    guide: 6개 오류 모두 검출 시 5점, 5개 4점, 4개 3점, 3개 이하 1점
  - name: 교정 정확도
    max: 5
    guide: 검출한 오류를 올바르게 수정 시 5점, 오탐(잘못된 수정) 있으면 감점
  - name: 설명 명확성
    max: 5
    guide: 각 오류에 대해 이유(조사 오류, 띄어쓰기 등) 명시 시 5점

golden: |
  이번 분기 성과보고서를 검토한 결과, 영업팀에서 목표 대비 115%의 실적을 달성한 것을
  확인하였습니다. 특히 신규 고객 유치에 있어 전 분기 대비 28%가 증가하였으며, 기존 고객의
  재계약률도 92%에 달하는 수준으로 향상되었습니다. 이러한 성과는 팀원 전원이 협력하여
  이루어낸 결과로, 각 팀원의 노력과 헌신을 높이 평가합니다. 향후에는 현재의 모멘텀을
  유지하면서 미개척 시장으로의 확장도 추진할 예정입니다.

  [교정 내역]
  1. "보고서을" → "보고서를" — '보고서'(받침 없음) 뒤 목적격 조사는 '를'
  2. "달성 한" → "달성한" — 용언의 관형형은 앞말과 붙여 씀
  3. "전분기" → "전 분기" — '전(前)'은 뒤 명사와 띄어 씀
  4. "재계약율" → "재계약률" — 앞 음절 받침이 있으면 '률' 사용
  5. "높히" → "높이" — 형용사 '높다'의 부사형은 '높이'
  6. "추진 할" → "추진할" — 의존명사 '것'이 없으므로 붙여 씀
