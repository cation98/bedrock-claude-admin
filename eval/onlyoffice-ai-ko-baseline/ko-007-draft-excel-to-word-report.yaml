id: ko-007-draft-excel-to-word-report
menu: draft
description: |
  5개 항목 프로젝트 진행 현황 CSV(Excel 표 사본)를 구조화된 Word 보고서 초안으로 변환.
  표 형태, 이슈 요약, 전체 요약 문단 포함 여부를 평가함.

input: |
  다음 프로젝트 현황 데이터를 보고서 초안으로 작성해 주세요.

  프로젝트,담당자,상태,진행률,예정완료일,비고
  인증 게이트웨이 개발,김민준,진행중,75%,2026-04-18,API 테스트 완료 필요
  DB 스키마 마이그레이션,이수진,완료,100%,2026-04-10,검증 완료
  프론트엔드 대시보드,박지현,진행중,60%,2026-04-25,UX 리뷰 대기
  CI/CD 파이프라인 구축,최동혁,지연,40%,2026-04-30,인프라 접근 권한 이슈
  보안 취약점 점검,한소영,대기,0%,2026-05-07,외부 보안 감사팀 일정 확정 후 시작

expected:
  structural:
    - 전체 현황 요약 문단 (완료/진행/지연/대기 건수, 평균 진행률)
    - 세부 현황 표 (프로젝트, 담당자, 상태, 진행률, 예정완료일)
    - 이슈 및 조치 사항 섹션 (지연/대기 항목에 대한 설명)
    - 한국어 마크다운 헤딩(##, ###) 또는 제목 사용
  forbidden:
    - 원본 CSV에 없는 담당자 또는 수치 생성 금지
    - 완료 항목을 이슈로 잘못 분류 금지
    - 영어 섹션 헤딩 사용 금지

rubric:
  - name: 데이터 정확성
    max: 5
    guide: 5개 항목 수치·상태·담당자 모두 정확히 반영 시 5점
  - name: 보고서 형식
    max: 5
    guide: 요약+표+이슈 3섹션 구조 갖추고 비즈니스 문서 형태면 5점
  - name: 한국어 자연스러움
    max: 5
    guide: 어색한 직역 없고 자연스러운 보고 문체이면 5점

golden: |
  ## 프로젝트 주간 진행 현황 보고서

  **기준일**: 2026년 4월 12일

  ### 1. 전체 현황 요약

  현재 5개 세부 과제 중 1개(20%)가 완료되었으며, 2개가 정상 진행 중, 1개가 지연,
  1개가 착수 대기 상태입니다. 전체 평균 진행률은 55%입니다.

  ### 2. 세부 과제별 현황

  | 과제명 | 담당자 | 상태 | 진행률 | 예정 완료일 |
  |--------|--------|------|--------|-------------|
  | 인증 게이트웨이 개발 | 김민준 | 진행중 | 75% | 2026-04-18 |
  | DB 스키마 마이그레이션 | 이수진 | **완료** | 100% | 2026-04-10 |
  | 프론트엔드 대시보드 | 박지현 | 진행중 | 60% | 2026-04-25 |
  | CI/CD 파이프라인 구축 | 최동혁 | **지연** | 40% | 2026-04-30 |
  | 보안 취약점 점검 | 한소영 | 대기 | 0% | 2026-05-07 |

  ### 3. 이슈 및 조치 사항

  - **CI/CD 파이프라인 구축** (최동혁): 인프라 접근 권한 이슈로 일정이 지연되고 있습니다.
    권한 처리 절차 진행 중이며, 조속한 해결이 필요합니다.
  - **인증 게이트웨이 개발** (김민준): API 테스트 완료 후 최종 검증 단계 진입 예정입니다.
  - **보안 취약점 점검** (한소영): 외부 보안 감사팀 일정 확정(2026-05-07) 후 착수 예정입니다.
