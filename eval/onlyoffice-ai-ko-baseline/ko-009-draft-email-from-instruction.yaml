id: ko-009-draft-email-from-instruction
menu: draft
description: |
  구매팀 담당자가 협력업체에 보내는 계약 체결 요청 이메일을 지시사항 bullet에서 생성.
  공식 이메일 형식(제목, 수신, 본문, 서명)과 한국어 비즈니스 경어체를 평가함.

input: |
  다음 내용으로 공식 이메일을 작성해 주세요.

  - 수신: 김영호 부장, (주)테크솔루션
  - 발신: 이진아 과장, 구매팀
  - 목적: 2분기 유지보수 계약 체결 요청
  - 계약 조건: 기존 계약과 동일 (단가 동결)
  - 변경 사항: SLA 응답 시간 24시간 → 4시간으로 변경 요청
  - 기한: 4월 30일까지 서명 및 반송
  - 관련 문서 첨부 예정
  - 최종 계약서는 법무팀 검토 후 5월 3일 발송 예정

expected:
  structural:
    - 이메일 제목 포함
    - 수신인 직함·성명 호칭 (김영호 부장님)
    - 발신자 자기소개 (이진아 과장, 구매팀)
    - 본문: 계약 조건 + SLA 변경 요청 + 기한 + 문서 첨부 안내
    - 마무리 인사 및 서명 (이름, 직책, 부서, 연락처)
    - 마감일 강조 (4월 30일)
  forbidden:
    - 원본 bullet에 없는 조건 추가 금지
    - 영문 이메일 형식(Hi/Best regards) 사용 금지
    - 반말 또는 구어체 사용 금지

rubric:
  - name: 지시 반영도
    max: 5
    guide: 8개 지시사항(수신/발신/목적/조건/SLA변경/기한/첨부/법무일정) 모두 반영 시 5점
  - name: 이메일 형식
    max: 5
    guide: 제목+수신인호칭+본문+서명 구조 완비, 한국식 비즈니스 이메일 관습에 맞으면 5점
  - name: 한국어 문체
    max: 5
    guide: -습니다/-드립니다 격식체 일관, 자연스러운 비즈니스 한국어이면 5점

golden: |
  제목: 2분기 IT 유지보수 계약 체결 요청 건

  김영호 부장님,

  안녕하세요. SK온 구매팀 이진아 과장입니다.

  2분기 IT 유지보수 계약 체결과 관련하여 안내 말씀드립니다.

  이번 계약은 단가를 기존과 동일하게 동결하는 조건으로 진행하고자 합니다. 다만 서비스
  수준 협약(SLA) 조항 중 장애 대응 시간을 기존 24시간에서 4시간으로 단축하는 조건을
  반영하였사오니 검토 후 의견 주시면 감사하겠습니다.

  계약 관련 문서를 본 메일에 첨부하였으며, 최종 계약서는 법무팀 검토를 거쳐 5월 3일(월)에
  발송드릴 예정입니다.

  번거로우시겠지만 **4월 30일(목)까지** 계약서에 서명하시어 반송해 주시면 감사하겠습니다.

  추가 문의 사항이 있으시면 언제든지 연락 주시기 바랍니다. 감사합니다.

  이진아 과장
  구매팀 | SK온
  이메일: jinalee@skons.net | 내선: 02-XXXX-XXXX
