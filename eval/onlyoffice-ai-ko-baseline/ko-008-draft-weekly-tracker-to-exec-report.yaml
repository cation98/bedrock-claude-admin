id: ko-008-draft-weekly-tracker-to-exec-report
menu: draft
description: |
  팀원 5명의 주간 업무 현황 tracker(마크다운 표)를 임원용 주간 보고서 초안으로 변환.
  리스크 표와 다음 주 주요 일정이 핵심 판단 포인트.

input: |
  다음 주간 업무 현황을 임원 보고서 형식으로 작성해 주세요.

  팀: 플랫폼 개발팀 (팀장: 정우진)
  기간: 2026년 4월 7일 ~ 4월 11일

  | 팀원 | 이번 주 완료 | 다음 주 계획 | 이슈/리스크 |
  |------|------------|------------|------------|
  | 김민준 | 인증 API v2 개발 완료, 단위 테스트 95% | 통합 테스트 수행, 스테이징 배포 | 없음 |
  | 이수진 | DB 마이그레이션 스크립트 작성 및 검증 완료 | 프로덕션 마이그레이션 준비 | DBA 리뷰 필요 (이번 주 내) |
  | 박지현 | 대시보드 UI 초안 완성, Figma 프로토타입 제작 | 프론트엔드 구현 착수 | UX 리뷰 미완료 (승인 대기) |
  | 최동혁 | ArgoCD 설정 완료, 테스트 환경 배포 성공 | 스테이징 환경 CI/CD 구축 | 프로덕션 IAM 권한 미부여 |
  | 한소영 | 보안 감사 RFP 작성 완료 | 벤더 선정 미팅 (4/15) | 외부 감사 일정 5/7로 확정 |

expected:
  structural:
    - 보고 기간과 팀장 정보 포함
    - 핵심 성과 요약 문단
    - 리스크 및 조치 필요 사항 표 또는 목록
    - 다음 주 주요 일정 섹션
    - 임원 보고서에 적합한 간결한 문체
  forbidden:
    - 팀원 개인별 업무 나열식 보고 금지 (임원 보고서는 통합 관점)
    - 원본에 없는 성과 또는 리스크 생성(환각) 금지
    - 이슈 없는 항목을 리스크로 분류 금지 (김민준: 이슈 없음)

rubric:
  - name: 핵심 요약 완성도
    max: 5
    guide: 주요 완료 성과(인증 API, DB 스크립트, CI/CD)와 3개 리스크 모두 포함 시 5점
  - name: 임원 보고서 형식
    max: 5
    guide: 통합 요약 관점, 리스크 강조, 다음 주 일정 포함한 임원 문서 형태면 5점
  - name: 한국어 간결성
    max: 5
    guide: 임원이 1분 안에 파악 가능한 밀도와 간결성이면 5점

golden: |
  ## 플랫폼 개발팀 주간 현황 보고

  **보고 기간**: 2026년 4월 7일 ~ 4월 11일 | **팀장**: 정우진

  ---

  ### 핵심 성과

  이번 주 인증 API v2 개발이 완료되어 다음 주 통합 테스트 단계 진입을 앞두고 있습니다.
  DB 마이그레이션 스크립트 검증도 완료되어 프로덕션 적용 준비가 임박하였으며,
  CI/CD 파이프라인의 테스트 환경 배포가 성공적으로 확인되었습니다.

  ### 주요 리스크 및 조치 필요 사항

  | 리스크 | 담당자 | 필요 조치 | 기한 |
  |--------|--------|-----------|------|
  | DB DBA 리뷰 미완료 | 이수진 | DBA 리뷰 일정 즉시 확정 | 이번 주 내 |
  | UX 리뷰 승인 대기 | 박지현 | UX팀 리뷰 일정 확정 | 4/14(화) 전 |
  | 프로덕션 IAM 권한 미부여 | 최동혁 | 인프라팀 권한 부여 요청 | 즉시 |

  ### 다음 주 주요 일정

  - 통합 테스트 수행 및 스테이징 배포 (김민준)
  - 프로덕션 DB 마이그레이션 준비 완료 (이수진)
  - 프론트엔드 구현 착수 (박지현)
  - 보안 감사 벤더 선정 미팅 4/15 (한소영)
