id: ko-002-summary-tech-mixed
menu: summarize
description: |
  한국어·영문 기술 용어가 혼재된 MSA 전환 보고서를 2문단으로 요약.
  Kubernetes, gRPC, ArgoCD 등 고유명사 영문 표기는 원형 유지해야 함.

input: |
  당사의 MSA(Microservices Architecture) 전환 프로젝트는 2분기 중 핵심 마일스톤을
  달성하였습니다. 기존 모놀리식 애플리케이션을 12개 독립 서비스로 분리하고, 각 서비스는
  Kubernetes 클러스터에서 HPA(Horizontal Pod Autoscaler)를 통해 자동 스케일링을 지원합니다.
  API Gateway로는 Kong을 채택하였으며, 서비스 간 통신은 gRPC를 기본으로 하되 외부
  인터페이스는 REST API를 유지합니다. CI/CD 파이프라인은 GitHub Actions와 ArgoCD를
  연동하여 GitOps 방식으로 배포 자동화를 구현하였습니다. 현재 서비스 Mesh로 Istio를
  도입 중이며, 트래픽 관리와 observability 강화를 위해 Jaeger 및 Prometheus 연동이
  진행 중입니다.

expected:
  structural:
    - 2문단 구성
    - 1문단=아키텍처 전환 성과, 2문단=현재 진행 중인 작업
    - 고유명사 영문 유지: Kubernetes, gRPC, Kong, ArgoCD, Istio, Jaeger, Prometheus
  forbidden:
    - 기술 용어 오역 또는 임의 번역 금지
    - 원문에 없는 기술 스택 추가 금지
    - 영어 문장(서술) 혼입 금지 — 기술 고유명사는 허용

rubric:
  - name: 기술 정확성
    max: 5
    guide: 아키텍처 내용(12개 서비스, HPA, GitOps 등) 정확히 반영 시 5점
  - name: 용어 보존
    max: 5
    guide: Kubernetes/gRPC/Kong/ArgoCD/Istio/Jaeger/Prometheus 모두 원형 유지 시 5점
  - name: 한국어 자연스러움
    max: 5
    guide: 영문 기술용어와 한국어 서술이 자연스럽게 혼재 시 5점

golden: |
  2분기 MSA 전환 프로젝트에서 모놀리식 애플리케이션을 12개 독립 서비스로 분리하는
  핵심 마일스톤을 달성하였습니다. 각 서비스는 Kubernetes 클러스터에서 HPA 기반 자동
  스케일링을 지원하며, API Gateway로 Kong을 채택해 서비스 간 gRPC 통신과 외부 REST API를
  병행 운용합니다.

  배포 체계 측면에서는 GitHub Actions와 ArgoCD를 연동한 GitOps 파이프라인으로 CI/CD를
  자동화하였으며, 현재 Istio 기반 서비스 Mesh 도입과 Jaeger·Prometheus 연동을 통한
  observability 강화 작업이 진행 중입니다.
