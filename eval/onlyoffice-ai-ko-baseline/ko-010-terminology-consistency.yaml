id: ko-010-terminology-consistency
menu: proofread
description: |
  동일 개념을 3가지 표기로 혼용("데이터베이스"/"DB"/"데이터 베이스",
  "API"/"인터페이스"/"interface")한 기술 문서를 통일.
  통일 기준 선택의 일관성과 용어 매핑 표 제공 여부를 평가함.

input: |
  당사의 고객 데이터베이스는 현재 레거시 시스템과 신규 플랫폼 두 곳에 분산 저장되어 있습니다.
  레거시 DB에는 2020년 이전 고객 정보가 보관되어 있으며, 신규 플랫폼의 데이터 베이스에는
  최근 3년간의 거래 내역이 포함되어 있습니다. 두 시스템 간 데이터 연동을 위해서는 API를
  활용한 실시간 동기화가 필요합니다. 현재 레거시 시스템의 인터페이스는 REST 방식이며,
  신규 플랫폼의 interface는 GraphQL을 지원합니다. 향후 단일 데이터베이스로 통합 시,
  마이그레이션 스크립트와 ETL 프로세스를 병행하여 데이터 정합성을 확보할 예정입니다.

expected:
  structural:
    - 통일된 전체 문서 반환
    - 용어 통일 기준 매핑 표 또는 목록 제공
    - '"데이터베이스"/"DB"/"데이터 베이스" → 하나의 표기로 통일'
    - '"API"/"인터페이스"/"interface" → 하나의 표기로 통일'
  forbidden:
    - 원문 수치 또는 기술 내용 변경 금지
    - 동일 문서 내 같은 용어를 여전히 다르게 표기하는 경우 금지
    - 통일 기준을 문맥 없이 임의로 섞어 쓰는 경우 금지

rubric:
  - name: 용어 통일 완성도
    max: 5
    guide: 2개 용어군 모두 문서 전체에 걸쳐 일관되게 통일 시 5점
  - name: 의미 보존
    max: 5
    guide: 용어 교체 후 문장 의미가 원문과 동일하면 5점
  - name: 가독성 향상
    max: 5
    guide: 통일 후 문서가 읽기 쉬워졌고 매핑 표가 명확하면 5점

golden: |
  당사의 고객 데이터베이스는 현재 레거시 시스템과 신규 플랫폼 두 곳에 분산 저장되어 있습니다.
  레거시 데이터베이스에는 2020년 이전 고객 정보가 보관되어 있으며, 신규 플랫폼의
  데이터베이스에는 최근 3년간의 거래 내역이 포함되어 있습니다. 두 시스템 간 데이터 연동을
  위해서는 API를 활용한 실시간 동기화가 필요합니다. 현재 레거시 시스템의 API는 REST 방식이며,
  신규 플랫폼의 API는 GraphQL을 지원합니다. 향후 단일 데이터베이스로 통합 시, 마이그레이션
  스크립트와 ETL 프로세스를 병행하여 데이터 정합성을 확보할 예정입니다.

  [통일된 용어 목록]
  | 원문 표기 | 통일된 표기 | 비고 |
  |-----------|-------------|------|
  | DB | 데이터베이스 | 한국어 문서 표준 표기 |
  | 데이터 베이스 | 데이터베이스 | 띄어쓰기 오류 수정 |
  | 인터페이스 | API | 기술 문서 맥락에서 API가 더 구체적 |
  | interface | API | 영문 혼용 제거 |
