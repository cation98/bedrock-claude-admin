id: ko-001-summary-long-paragraph
menu: summarize
description: |
  500자 수준의 한글 IT 프로젝트 성과 보고 문단을 3문단으로 요약.
  핵심 수치(가용성, 비용 절감률)와 이슈(스키마 불일치), 향후 계획을 보존해야 함.

input: |
  2026년 1분기 IT 인프라 현대화 프로젝트가 예정된 일정에 맞추어 성공적으로 완료되었습니다.
  이번 프로젝트는 노후화된 온프레미스 서버 32대를 AWS 클라우드로 이전하는 것을 핵심 목표로
  하였으며, 인프라 운영팀 8명과 외부 컨설팅 인력 4명이 총 12주에 걸쳐 작업을 수행하였습니다.
  마이그레이션 완료 후 시스템 가용성은 기존 99.2%에서 99.87%로 향상되었고, 월간 인프라
  운영 비용은 직전 분기 대비 23% 절감되었습니다. 다만 마이그레이션 과정에서 레거시
  데이터베이스의 스키마 불일치 문제가 발견되어 2주간 추가 작업이 필요하였으며, 이로 인해
  일부 비핵심 시스템의 전환이 2분기로 연기되었습니다. 향후 계획으로는 2분기 중 보안
  취약점 점검 및 DR(재해복구) 시나리오 테스트를 완료하고, 남은 12개 비핵심 시스템의
  마이그레이션을 진행할 예정입니다.

expected:
  structural:
    - 3문단 구성 (빈 줄로 구분)
    - 각 문단 2~4문장
    - 핵심 수치 유지: 32대, 12주, 99.2%, 99.87%, 23%, 12개
    - 1문단=프로젝트 개요, 2문단=성과, 3문단=이슈+향후계획
  forbidden:
    - 원문에 없는 사실 추가(환각) 금지
    - 영어 문장 또는 영어 서술어 혼입 금지
    - 원문에 언급되지 않은 숫자 생성 금지

rubric:
  - name: 정보 보존도
    max: 5
    guide: 핵심 수치(32대/12주/99.87%/23%/12개) 및 이슈(스키마 불일치) 모두 포함 시 5점
  - name: 간결성
    max: 5
    guide: 원문 대비 60% 이하로 압축하면서 의미 손실 없으면 5점
  - name: 한국어 자연스러움
    max: 5
    guide: 어색한 표현 없고 비즈니스 문체 일관성 유지 시 5점

golden: |
  2026년 1분기 IT 인프라 현대화 프로젝트가 계획된 일정 내에 성공적으로 완료되었습니다.
  온프레미스 서버 32대를 AWS 클라우드로 이전하는 이번 작업은 인프라 운영팀 및 외부 컨설팅
  인력 총 12명이 12주간 수행하였습니다.

  프로젝트 완료 후 시스템 가용성은 99.2%에서 99.87%로 향상되었으며, 월간 인프라 운영 비용은
  전 분기 대비 23% 절감되는 성과를 달성하였습니다.

  레거시 데이터베이스 스키마 불일치 문제로 일부 비핵심 시스템 전환은 2분기로 연기되었습니다.
  2분기에는 보안 취약점 점검, DR 시나리오 테스트와 함께 나머지 12개 비핵심 시스템의
  마이그레이션을 완료할 계획입니다.
