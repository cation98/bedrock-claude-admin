# Auth Gateway 로컬 개발용 docker-compose
# 사용법: docker compose up --build

services:
  # PostgreSQL (플랫폼 DB)
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: bedrock_claude
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10

  # Auth Gateway
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/bedrock_claude
      JWT_SECRET_KEY: dev-secret-key-do-not-use-in-prod
      K8S_IN_CLUSTER: "false"
      DEBUG: "true"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    # 로컬 개발 시 코드 변경 자동 반영
    volumes:
      - ./app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
