<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>세션 만료 — AI 플랫폼</title>
    <!-- DESIGN.md: Geist + Pretendard -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-sans/style.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
    <style>
        /* DESIGN.md CSS Tokens */
        :root {
            --font-sans: 'Geist', 'Pretendard Variable', -apple-system, BlinkMacSystemFont, sans-serif;
            --bg: #F9FAFB;
            --surface: #FFFFFF;
            --border: #E5E7EB;
            --text-primary: #111827;
            --text-secondary: #6B7280;
            --text-muted: #9CA3AF;
            --primary: #2563EB;
            --primary-hover: #1D4ED8;
            --primary-light: #DBEAFE;
            --warning: #D97706;
            --warning-light: #FEF3C7;
            --radius-md: 6px;
            --radius-lg: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-sans);
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 2.5rem 2rem;
            max-width: 420px;
            width: 100%;
            text-align: center;
        }

        .icon {
            font-size: 2.5rem;
            margin-bottom: 1.25rem;
            line-height: 1;
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .desc {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 1.75rem;
            line-height: 1.6;
        }

        .countdown {
            display: inline-block;
            font-size: 0.8rem;
            color: var(--text-muted);
            background: var(--warning-light);
            border: 1px solid #FDE68A;
            border-radius: 9999px;
            padding: 0.3rem 0.85rem;
            margin-bottom: 1.75rem;
        }

        .btn-primary {
            display: inline-block;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: var(--radius-md);
            padding: 0.6rem 1.5rem;
            font-size: 0.9rem;
            font-weight: 500;
            font-family: var(--font-sans);
            cursor: pointer;
            text-decoration: none;
            transition: background 75ms ease-out;
            width: 100%;
        }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-secondary {
            display: inline-block;
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 0.55rem 1.5rem;
            font-size: 0.875rem;
            font-family: var(--font-sans);
            cursor: pointer;
            text-decoration: none;
            transition: border-color 75ms ease-out, color 75ms ease-out;
            width: 100%;
            margin-top: 0.5rem;
        }
        .btn-secondary:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .status-msg {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 1rem;
            min-height: 1.2em;
        }
    </style>
</head>
<body>
    <div class="card" role="main">
        <div class="icon" aria-hidden="true">🔐</div>
        <h1>세션이 만료되었습니다</h1>
        <p class="desc">
            보안을 위해 로그인 세션이 만료되었습니다.<br>
            계속하려면 자동으로 갱신됩니다.
        </p>
        <div class="countdown" id="countdown" aria-live="polite">
            <span id="countdownNum">3</span>초 후 자동 갱신…
        </div>
        <button class="btn-primary" id="refreshBtn" onclick="doRefresh()">
            지금 갱신하기
        </button>
        <a class="btn-secondary" href="/" id="loginLink">
            처음부터 로그인
        </a>
        <div class="status-msg" id="statusMsg" aria-live="polite"></div>
    </div>

    <script>
        // #19: JWT refresh 플로우
        // 이 페이지는 ai-chat.skons.net/auth/expired 에서 서빙됨
        // nginx error_page 지시어: `error_page 401 /auth/expired;`
        //
        // 플로우:
        //   Open WebUI 401 → nginx error_page → /auth/expired (이 페이지)
        //   → portal.html?refresh=1&next=<original_url> 리디렉트
        //   → portal.html이 /auth/refresh 호출 → 새 JWT 쿠키
        //   → 원래 경로로 복귀

        var PORTAL_URL = 'https://ai.skons.net/portal/';

        // nginx error_page 401 동작 방식에 따른 originalPath 결정:
        //   내부 리다이렉트(기본): 브라우저 URL = 원래 Open WebUI 페이지 그대로 → window.location.href 사용
        //   302 리다이렉트(=302): 브라우저가 /auth/expired 로 이동 → document.referrer 사용
        var currentHref = window.location.href;
        var isOnExpiredPage = currentHref.indexOf('/auth/expired') !== -1;
        var originalPath = isOnExpiredPage
            ? (document.referrer
                ? encodeURIComponent(document.referrer)
                : encodeURIComponent('https://ai-chat.skons.net'))
            : encodeURIComponent(currentHref);

        var countdownEl = document.getElementById('countdownNum');
        var statusEl    = document.getElementById('statusMsg');
        var refreshBtn  = document.getElementById('refreshBtn');
        var secs = 3;

        // 카운트다운 후 자동 갱신
        var timer = setInterval(function() {
            secs--;
            if (countdownEl) countdownEl.textContent = secs;
            if (secs <= 0) {
                clearInterval(timer);
                doRefresh();
            }
        }, 1000);

        function doRefresh() {
            clearInterval(timer);
            if (refreshBtn) {
                refreshBtn.disabled = true;
                refreshBtn.textContent = '갱신 중…';
            }
            if (statusEl) statusEl.textContent = '세션을 갱신하는 중입니다…';

            // portal.html?refresh=1&next=<original_url> 로 이동
            // portal.html이 /auth/refresh 호출 후 원래 경로로 복귀
            var hubRefreshUrl = PORTAL_URL + '?refresh=1&next=' + originalPath;
            window.location.replace(hubRefreshUrl);
        }
    </script>
</body>
</html>
