<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 웹앱 관리 — Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }

        /* ── Header ── */
        .header {
            background: #1e293b;
            border-bottom: 1px solid #334155;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            color: #f8fafc;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .username-badge {
            font-size: 0.875rem;
            color: #94a3b8;
        }
        .header-btn {
            padding: 0.4rem 0.75rem;
            background: transparent;
            border: 1px solid #475569;
            border-radius: 6px;
            color: #94a3b8;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .header-btn:hover {
            border-color: #6366f1;
            color: #e2e8f0;
        }

        /* ── Main Container ── */
        .main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* ── App Card Grid ── */
        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.25rem;
        }
        .app-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 1.5rem;
            transition: border-color 0.2s;
        }
        .app-card:hover {
            border-color: #475569;
        }
        .app-card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 1rem;
        }
        .app-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #f8fafc;
            margin-bottom: 0.25rem;
        }
        .app-url {
            font-size: 0.8rem;
            color: #818cf8;
            text-decoration: none;
            word-break: break-all;
        }
        .app-url:hover {
            text-decoration: underline;
        }
        .status-badge {
            padding: 0.2rem 0.6rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 600;
            white-space: nowrap;
            flex-shrink: 0;
            margin-left: 0.75rem;
        }
        .status-running {
            background: #052e16;
            color: #86efac;
            border: 1px solid #16a34a;
        }
        .status-stopped {
            background: #1e293b;
            color: #94a3b8;
            border: 1px solid #475569;
        }
        .badge-row {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        .metric-badge {
            padding: 0.25rem 0.6rem;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            font-size: 0.75rem;
            color: #cbd5e1;
        }
        .metric-badge span {
            color: #f8fafc;
            font-weight: 600;
        }
        .card-actions {
            display: flex;
            gap: 0.5rem;
        }
        .btn-sm {
            padding: 0.4rem 0.85rem;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #6366f1;
            color: white;
        }
        .btn-primary:hover { background: #4f46e5; }
        .btn-secondary {
            background: transparent;
            color: #94a3b8;
            border: 1px solid #475569;
        }
        .btn-secondary:hover {
            border-color: #6366f1;
            color: #e2e8f0;
        }

        /* ── Detail View ── */
        .detail-view {
            display: none;
        }
        .detail-view.active {
            display: block;
        }
        .app-list-view.hidden {
            display: none;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            color: #94a3b8;
            font-size: 0.875rem;
            cursor: pointer;
            margin-bottom: 1.5rem;
            background: none;
            border: none;
            transition: color 0.2s;
        }
        .back-btn:hover { color: #e2e8f0; }

        .detail-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }
        .detail-header h2 {
            font-size: 1.35rem;
            font-weight: 600;
            color: #f8fafc;
        }

        /* ── Tabs ── */
        .tabs {
            display: flex;
            gap: 0;
            border-bottom: 1px solid #334155;
            margin-bottom: 1.5rem;
        }
        .tab-btn {
            padding: 0.75rem 1.5rem;
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            color: #94a3b8;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab-btn:hover { color: #e2e8f0; }
        .tab-btn.active {
            color: #818cf8;
            border-bottom-color: #6366f1;
        }
        .tab-panel {
            display: none;
        }
        .tab-panel.active {
            display: block;
        }

        /* ── ACL Section ── */
        .acl-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }
        .acl-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 0.75rem 1rem;
        }
        .acl-item-left {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .acl-type-icon {
            font-size: 1rem;
            width: 1.5rem;
            text-align: center;
        }
        .acl-value {
            font-size: 0.875rem;
            color: #e2e8f0;
        }
        .acl-label {
            font-size: 0.75rem;
            color: #64748b;
            margin-left: 0.25rem;
        }
        .acl-granted-by {
            font-size: 0.7rem;
            color: #64748b;
        }
        .acl-revoke-btn {
            background: none;
            border: none;
            color: #64748b;
            font-size: 1rem;
            cursor: pointer;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            transition: all 0.2s;
        }
        .acl-revoke-btn:hover {
            color: #f87171;
            background: #450a0a;
        }

        .acl-form {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 1.5rem;
        }
        .acl-form h3 {
            font-size: 0.95rem;
            font-weight: 600;
            color: #f8fafc;
            margin-bottom: 1rem;
        }
        .form-row {
            display: flex;
            gap: 0.75rem;
            align-items: flex-end;
            flex-wrap: wrap;
        }
        .form-group {
            flex: 1;
            min-width: 160px;
        }
        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: #cbd5e1;
            margin-bottom: 0.4rem;
        }
        .form-group select,
        .form-group input {
            width: 100%;
            padding: 0.6rem 0.75rem;
            background: #0f172a;
            border: 1px solid #475569;
            border-radius: 8px;
            color: #f1f5f9;
            font-size: 0.875rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group select:focus,
        .form-group input:focus {
            border-color: #6366f1;
        }
        .form-group select {
            cursor: pointer;
        }
        .form-group select option {
            background: #1e293b;
            color: #e2e8f0;
        }
        .form-group input::placeholder {
            color: #64748b;
        }
        .btn-add {
            padding: 0.6rem 1.25rem;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
            height: fit-content;
        }
        .btn-add:hover { background: #4f46e5; }
        .btn-add:disabled {
            background: #475569;
            cursor: not-allowed;
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: #64748b;
            font-size: 0.875rem;
        }

        /* ── Stats Section ── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 1.25rem;
            text-align: center;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #f8fafc;
            margin-bottom: 0.25rem;
        }
        .stat-label {
            font-size: 0.8rem;
            color: #94a3b8;
        }

        /* ── CSS Bar Chart ── */
        .chart-section {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .chart-section h3 {
            font-size: 0.95rem;
            font-weight: 600;
            color: #f8fafc;
            margin-bottom: 1.25rem;
        }
        .bar-chart {
            display: flex;
            align-items: flex-end;
            gap: 4px;
            height: 160px;
            padding-bottom: 1.75rem;
            position: relative;
            border-bottom: 1px solid #334155;
        }
        .bar-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100%;
            justify-content: flex-end;
            position: relative;
        }
        .bar {
            width: 100%;
            max-width: 36px;
            background: #6366f1;
            border-radius: 4px 4px 0 0;
            min-height: 2px;
            transition: height 0.3s ease;
            position: relative;
        }
        .bar:hover {
            background: #818cf8;
        }
        .bar-tooltip {
            display: none;
            position: absolute;
            top: -28px;
            left: 50%;
            transform: translateX(-50%);
            background: #334155;
            color: #f8fafc;
            font-size: 0.7rem;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            white-space: nowrap;
        }
        .bar:hover .bar-tooltip {
            display: block;
        }
        .bar-label {
            position: absolute;
            bottom: -22px;
            font-size: 0.65rem;
            color: #64748b;
            white-space: nowrap;
        }

        /* ── Recent Visitors Table ── */
        .visitors-section {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 1.5rem;
        }
        .visitors-section h3 {
            font-size: 0.95rem;
            font-weight: 600;
            color: #f8fafc;
            margin-bottom: 1rem;
        }
        .visitors-table {
            width: 100%;
            border-collapse: collapse;
        }
        .visitors-table th {
            text-align: left;
            padding: 0.6rem 0.75rem;
            font-size: 0.75rem;
            font-weight: 600;
            color: #94a3b8;
            border-bottom: 1px solid #334155;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .visitors-table td {
            padding: 0.6rem 0.75rem;
            font-size: 0.85rem;
            color: #cbd5e1;
            border-bottom: 1px solid #1e293b;
        }
        .visitors-table tr:hover td {
            background: #0f172a;
        }

        /* ── Toast ── */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 0.75rem 1.25rem;
            border-radius: 8px;
            font-size: 0.875rem;
            z-index: 1000;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
        .toast-success {
            background: #052e16;
            border: 1px solid #16a34a;
            color: #86efac;
        }
        .toast-error {
            background: #450a0a;
            border: 1px solid #dc2626;
            color: #fca5a5;
        }

        /* ── Loading ── */
        .loading-spinner {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            color: #64748b;
            font-size: 0.875rem;
            gap: 0.5rem;
        }
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid #334155;
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Responsive ── */
        @media (max-width: 640px) {
            .main { padding: 1rem; }
            .header { padding: 0.75rem 1rem; }
            .app-grid { grid-template-columns: 1fr; }
            .form-row { flex-direction: column; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>내 웹앱 관리</h1>
        <div class="header-right">
            <span class="username-badge" id="usernameBadge"></span>
            <button class="header-btn" onclick="location.href='/gallery/'" title="앱 갤러리">🏪 갤러리</button>
            <button class="header-btn" onclick="location.href='/hub/'" title="허브로 돌아가기">Hub</button>
        </div>
    </div>

    <div class="main">
        <!-- App List View -->
        <div class="app-list-view" id="appListView">
            <div id="appGrid" class="app-grid">
                <div class="loading-spinner" id="listLoading">
                    <div class="spinner"></div>
                    <span>앱 목록을 불러오는 중...</span>
                </div>
            </div>
        </div>

        <!-- App Detail View -->
        <div class="detail-view" id="detailView">
            <button class="back-btn" onclick="showAppList()">&#8592; 목록으로</button>

            <div class="detail-header">
                <h2 id="detailAppName"></h2>
                <span class="status-badge" id="detailStatusBadge"></span>
            </div>

            <div class="tabs">
                <button class="tab-btn active" data-tab="acl" onclick="switchTab('acl')">ACL 관리</button>
                <button class="tab-btn" data-tab="stats" onclick="switchTab('stats')">통계</button>
            </div>

            <!-- ACL Tab -->
            <div class="tab-panel active" id="tabAcl">
                <div class="acl-list" id="aclList"></div>

                <div class="acl-form">
                    <h3>ACL 추가</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="grantType">유형</label>
                            <select id="grantType" onchange="onGrantTypeChange()">
                                <option value="user">사용자 (User)</option>
                                <option value="team">팀 (Team)</option>
                                <option value="region">지역 (Region)</option>
                                <option value="job">직급 (Job)</option>
                                <option value="company">전체 공개 (Company)</option>
                            </select>
                        </div>
                        <div class="form-group" id="grantValueGroup">
                            <label for="grantValue">값</label>
                            <input type="text" id="grantValueInput" placeholder="사번 입력">
                            <select id="grantValueSelect" style="display:none"></select>
                        </div>
                        <button class="btn-add" id="addAclBtn" onclick="addAcl()">추가</button>
                    </div>
                </div>
            </div>

            <!-- Stats Tab -->
            <div class="tab-panel" id="tabStats">
                <div class="stats-grid" id="statsGrid">
                    <div class="stat-card">
                        <div class="stat-value" id="statDau">-</div>
                        <div class="stat-label">오늘 방문자 (DAU)</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="statMau">-</div>
                        <div class="stat-label">월간 방문자 (MAU)</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="statTotal">-</div>
                        <div class="stat-label">총 조회수</div>
                    </div>
                </div>

                <div class="chart-section">
                    <h3>일별 방문자 (DAU) - 최근 30일</h3>
                    <div class="bar-chart" id="dauChart"></div>
                </div>

                <div class="visitors-section">
                    <h3>최근 방문자</h3>
                    <table class="visitors-table">
                        <thead>
                            <tr>
                                <th>사번</th>
                                <th>이름</th>
                                <th>팀</th>
                                <th>시간</th>
                            </tr>
                        </thead>
                        <tbody id="visitorsBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        var API_BASE = window.location.origin;
        var currentApp = null;
        var aclOptions = null;

        // ── Safe DOM helpers ──
        function createTextEl(tag, text, className) {
            var el = document.createElement(tag);
            el.textContent = text;
            if (className) el.className = className;
            return el;
        }

        function clearChildren(el) {
            while (el.firstChild) el.removeChild(el.firstChild);
        }

        // ── Init ──
        document.addEventListener('DOMContentLoaded', function() {
            loadUserInfo();
            loadMyApps();
            loadAclOptions();
        });

        // ── Auth Helper ──
        function getToken() {
            var match = document.cookie.match(/(?:^|;\s*)claude_token=([^;]*)/);
            return match ? match[1] : null;
        }

        function apiFetch(url, options) {
            options = options || {};
            var token = getToken();
            var headers = Object.assign({ 'Content-Type': 'application/json' }, options.headers || {});
            if (token) headers['Authorization'] = 'Bearer ' + token;

            return fetch(url, Object.assign({}, options, { headers: headers })).then(function(res) {
                if (res.status === 401) {
                    var returnUrl = encodeURIComponent(window.location.pathname);
                    window.location.href = '/webapp-login?return_url=' + returnUrl;
                    return Promise.reject(new Error('Unauthorized'));
                }
                return res;
            });
        }

        function loadUserInfo() {
            var token = getToken();
            if (!token) return;
            try {
                var payload = JSON.parse(atob(token.split('.')[1]));
                document.getElementById('usernameBadge').textContent = payload.name || payload.sub || '';
            } catch (e) { /* ignore */ }
        }

        // ── Toast ──
        function showToast(message, type) {
            type = type || 'success';
            var toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast toast-' + type + ' show';
            setTimeout(function() { toast.classList.remove('show'); }, 3000);
        }

        // ── Number formatting ──
        function num(n) {
            if (n == null) return '0';
            return Number(n).toLocaleString();
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            try {
                var d = new Date(dateStr);
                return (d.getMonth() + 1) + '/' + d.getDate();
            } catch (e) { return dateStr; }
        }

        function formatTime(timeStr) {
            if (!timeStr) return '-';
            try {
                var d = new Date(timeStr);
                var now = new Date();
                var diffMin = Math.floor((now - d) / 60000);
                if (diffMin < 1) return '방금 전';
                if (diffMin < 60) return diffMin + '분 전';
                if (diffMin < 1440) return Math.floor(diffMin / 60) + '시간 전';
                return (d.getMonth() + 1) + '/' + d.getDate() + ' '
                    + String(d.getHours()).padStart(2, '0') + ':'
                    + String(d.getMinutes()).padStart(2, '0');
            } catch (e) { return timeStr; }
        }

        function getTypeIcon(type) {
            var icons = { user: '\uD83D\uDC64', team: '\uD83D\uDC65', region: '\uD83C\uDFE2', job: '\uD83D\uDCBC', company: '\uD83C\uDF10' };
            return icons[type] || '\uD83D\uDCCB';
        }

        // ── App List ──
        function loadMyApps() {
            var grid = document.getElementById('appGrid');
            clearChildren(grid);
            var loader = document.createElement('div');
            loader.className = 'loading-spinner';
            var sp = document.createElement('div');
            sp.className = 'spinner';
            loader.appendChild(sp);
            loader.appendChild(document.createTextNode('앱 목록을 불러오는 중...'));
            grid.appendChild(loader);

            apiFetch(API_BASE + '/api/v1/portal/my-apps').then(function(res) {
                if (!res.ok) throw new Error('Failed');
                return res.json();
            }).then(function(data) {
                renderAppGrid(data.apps || []);
            }).catch(function() {
                clearChildren(grid);
                grid.appendChild(createTextEl('div', '앱 목록을 불러올 수 없습니다.', 'empty-state'));
            });
        }

        function renderAppGrid(apps) {
            var grid = document.getElementById('appGrid');
            clearChildren(grid);

            if (!apps.length) {
                grid.appendChild(createTextEl('div', '등록된 웹앱이 없습니다.', 'empty-state'));
                return;
            }

            apps.forEach(function(app) {
                var card = document.createElement('div');
                card.className = 'app-card';

                // Header
                var header = document.createElement('div');
                header.className = 'app-card-header';

                var info = document.createElement('div');
                var nameEl = createTextEl('div', app.app_name, 'app-name');
                var urlEl = document.createElement('a');
                urlEl.className = 'app-url';
                urlEl.href = app.app_url;
                urlEl.target = '_blank';
                urlEl.textContent = app.app_url;
                info.appendChild(nameEl);
                info.appendChild(urlEl);

                var badge = document.createElement('span');
                badge.className = 'status-badge ' + (app.status === 'running' ? 'status-running' : 'status-stopped');
                badge.textContent = app.status === 'running' ? 'Running' : 'Stopped';

                header.appendChild(info);
                header.appendChild(badge);
                card.appendChild(header);

                // Badges
                var badgeRow = document.createElement('div');
                badgeRow.className = 'badge-row';
                ['DAU', 'MAU', 'ACL'].forEach(function(label) {
                    var val = label === 'DAU' ? app.dau : label === 'MAU' ? app.mau : app.acl_count;
                    var mb = document.createElement('span');
                    mb.className = 'metric-badge';
                    mb.appendChild(document.createTextNode(label + ' '));
                    var valSpan = document.createElement('span');
                    valSpan.textContent = num(val);
                    mb.appendChild(valSpan);
                    badgeRow.appendChild(mb);
                });
                card.appendChild(badgeRow);

                // Actions
                var actions = document.createElement('div');
                actions.className = 'card-actions';

                var aclBtn = document.createElement('button');
                aclBtn.className = 'btn-sm btn-primary';
                aclBtn.textContent = 'ACL 관리';
                aclBtn.addEventListener('click', (function(name) {
                    return function() { showAppDetail(name, 'acl'); };
                })(app.app_name));

                var statsBtn = document.createElement('button');
                statsBtn.className = 'btn-sm btn-secondary';
                statsBtn.textContent = '통계';
                statsBtn.addEventListener('click', (function(name) {
                    return function() { showAppDetail(name, 'stats'); };
                })(app.app_name));

                actions.appendChild(aclBtn);
                actions.appendChild(statsBtn);
                card.appendChild(actions);

                grid.appendChild(card);
            });
        }

        // ── App Detail ──
        function showAppDetail(appName, tab) {
            currentApp = appName;
            document.getElementById('appListView').classList.add('hidden');
            document.getElementById('detailView').classList.add('active');
            document.getElementById('detailAppName').textContent = appName;

            switchTab(tab || 'acl');
            loadAcls();
        }

        function showAppList() {
            currentApp = null;
            document.getElementById('detailView').classList.remove('active');
            document.getElementById('appListView').classList.remove('hidden');
            loadMyApps();
        }

        // ── Tabs ──
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(function(btn) {
                btn.classList.toggle('active', btn.dataset.tab === tab);
            });
            document.getElementById('tabAcl').classList.toggle('active', tab === 'acl');
            document.getElementById('tabStats').classList.toggle('active', tab === 'stats');

            if (tab === 'acl') loadAcls();
            if (tab === 'stats') loadStats();
        }

        // ── ACL ──
        function loadAclOptions() {
            apiFetch(API_BASE + '/api/v1/portal/acl-options').then(function(res) {
                if (res.ok) return res.json();
                return null;
            }).then(function(data) {
                if (data) aclOptions = data;
            }).catch(function() { /* fallback */ });
        }

        function loadAcls() {
            if (!currentApp) return;
            var list = document.getElementById('aclList');
            clearChildren(list);
            var loader = document.createElement('div');
            loader.className = 'loading-spinner';
            var sp = document.createElement('div');
            sp.className = 'spinner';
            loader.appendChild(sp);
            loader.appendChild(document.createTextNode('ACL 목록을 불러오는 중...'));
            list.appendChild(loader);

            apiFetch(API_BASE + '/api/v1/apps/' + encodeURIComponent(currentApp) + '/acl').then(function(res) {
                if (!res.ok) throw new Error('Failed');
                return res.json();
            }).then(function(data) {
                renderAcls(Array.isArray(data) ? data : []);
                if (data.status) {
                    var sb = document.getElementById('detailStatusBadge');
                    sb.className = 'status-badge ' + (data.status === 'running' ? 'status-running' : 'status-stopped');
                    sb.textContent = data.status === 'running' ? 'Running' : 'Stopped';
                }
            }).catch(function() {
                clearChildren(list);
                list.appendChild(createTextEl('div', 'ACL 목록을 불러올 수 없습니다.', 'empty-state'));
            });
        }

        function renderAcls(acls) {
            var list = document.getElementById('aclList');
            clearChildren(list);

            if (!acls.length) {
                list.appendChild(createTextEl('div', '등록된 ACL이 없습니다. 아래 양식에서 추가하세요.', 'empty-state'));
                return;
            }

            acls.forEach(function(acl) {
                var item = document.createElement('div');
                item.className = 'acl-item';

                var left = document.createElement('div');
                left.className = 'acl-item-left';

                var icon = createTextEl('span', getTypeIcon(acl.grant_type), 'acl-type-icon');

                var valueContainer = document.createElement('span');
                valueContainer.className = 'acl-value';
                valueContainer.appendChild(document.createTextNode(acl.grant_value || ''));
                if (acl.display_label) {
                    var lbl = createTextEl('span', ' (' + acl.display_label + ')', 'acl-label');
                    valueContainer.appendChild(lbl);
                }

                left.appendChild(icon);
                left.appendChild(valueContainer);

                var right = document.createElement('div');
                right.style.cssText = 'display:flex;align-items:center;gap:0.75rem;';

                if (acl.granted_by) {
                    right.appendChild(createTextEl('span', acl.granted_by, 'acl-granted-by'));
                }

                var revokeBtn = document.createElement('button');
                revokeBtn.className = 'acl-revoke-btn';
                revokeBtn.title = '삭제';
                revokeBtn.textContent = '\u2715';
                revokeBtn.addEventListener('click', (function(id) {
                    return function() { revokeAcl(id); };
                })(acl.id));
                right.appendChild(revokeBtn);

                item.appendChild(left);
                item.appendChild(right);
                list.appendChild(item);
            });
        }

        function onGrantTypeChange() {
            var type = document.getElementById('grantType').value;
            var inputEl = document.getElementById('grantValueInput');
            var selectEl = document.getElementById('grantValueSelect');
            var groupEl = document.getElementById('grantValueGroup');

            if (type === 'company') {
                groupEl.style.display = 'none';
                return;
            }
            groupEl.style.display = '';

            if (type === 'user') {
                inputEl.style.display = '';
                selectEl.style.display = 'none';
                inputEl.placeholder = '사번 입력';
                inputEl.value = '';
            } else {
                inputEl.style.display = 'none';
                selectEl.style.display = '';
                populateSelect(type);
            }
        }

        function populateSelect(type) {
            var selectEl = document.getElementById('grantValueSelect');
            clearChildren(selectEl);

            var defaultOpt = document.createElement('option');
            defaultOpt.value = '';
            defaultOpt.textContent = '선택하세요';
            selectEl.appendChild(defaultOpt);

            var options = [];
            if (aclOptions) {
                if (type === 'team') options = aclOptions.teams || [];
                else if (type === 'region') options = aclOptions.regions || [];
                else if (type === 'job') options = aclOptions.jobs || [];
            }

            options.forEach(function(o) {
                var opt = document.createElement('option');
                opt.value = o;
                opt.textContent = o;
                selectEl.appendChild(opt);
            });
        }

        function addAcl() {
            if (!currentApp) return;
            var type = document.getElementById('grantType').value;
            var value = '';

            if (type === 'company') {
                value = '*';
            } else if (type === 'user') {
                value = document.getElementById('grantValueInput').value.trim();
            } else {
                value = document.getElementById('grantValueSelect').value;
            }

            if (type !== 'company' && !value) {
                showToast('값을 입력해주세요.', 'error');
                return;
            }

            var btn = document.getElementById('addAclBtn');
            btn.disabled = true;
            btn.textContent = '추가 중...';

            apiFetch(API_BASE + '/api/v1/apps/' + encodeURIComponent(currentApp) + '/acl', {
                method: 'POST',
                body: JSON.stringify({ grant_type: type, grant_value: value })
            }).then(function(res) {
                if (!res.ok) return res.json().then(function(err) { throw new Error(err.detail || 'ACL 추가에 실패했습니다.'); });
                showToast('ACL이 추가되었습니다.');
                document.getElementById('grantValueInput').value = '';
                var sel = document.getElementById('grantValueSelect');
                if (sel.options.length > 0) sel.selectedIndex = 0;
                loadAcls();
            }).catch(function(e) {
                showToast(e.message, 'error');
            }).finally(function() {
                btn.disabled = false;
                btn.textContent = '추가';
            });
        }

        function revokeAcl(aclId) {
            if (!currentApp) return;
            if (!confirm('이 ACL을 삭제하시겠습니까?')) return;

            apiFetch(
                API_BASE + '/api/v1/apps/' + encodeURIComponent(currentApp) + '/acl/' + aclId,
                { method: 'DELETE' }
            ).then(function(res) {
                if (!res.ok) return res.json().then(function(err) { throw new Error(err.detail || 'ACL 삭제에 실패했습니다.'); });
                showToast('ACL이 삭제되었습니다.');
                loadAcls();
            }).catch(function(e) {
                showToast(e.message, 'error');
            });
        }

        // ── Stats ──
        function loadStats() {
            if (!currentApp) return;
            var chart = document.getElementById('dauChart');
            clearChildren(chart);
            var loader = document.createElement('div');
            loader.className = 'loading-spinner';
            var sp = document.createElement('div');
            sp.className = 'spinner';
            loader.appendChild(sp);
            loader.appendChild(document.createTextNode('통계를 불러오는 중...'));
            chart.appendChild(loader);

            var tbody = document.getElementById('visitorsBody');
            clearChildren(tbody);
            var tr = document.createElement('tr');
            var td = document.createElement('td');
            td.colSpan = 4;
            td.className = 'empty-state';
            td.textContent = '불러오는 중...';
            tr.appendChild(td);
            tbody.appendChild(tr);

            apiFetch(API_BASE + '/api/v1/portal/apps/' + encodeURIComponent(currentApp) + '/stats').then(function(res) {
                if (!res.ok) throw new Error('Failed');
                return res.json();
            }).then(function(data) {
                renderStats(data);
            }).catch(function() {
                clearChildren(chart);
                chart.appendChild(createTextEl('div', '통계를 불러올 수 없습니다.', 'empty-state'));
                clearChildren(tbody);
                var tr2 = document.createElement('tr');
                var td2 = document.createElement('td');
                td2.colSpan = 4;
                td2.className = 'empty-state';
                td2.textContent = '통계를 불러올 수 없습니다.';
                tr2.appendChild(td2);
                tbody.appendChild(tr2);
            });
        }

        function renderStats(data) {
            var dauSeries = data.dau_series || [];
            var todayDau = data.dau_today || 0;
            document.getElementById('statDau').textContent = num(todayDau);
            document.getElementById('statMau').textContent = num(data.mau || 0);
            document.getElementById('statTotal').textContent = num(data.total_views || 0);

            renderBarChart(dauSeries);
            renderVisitors(data.recent_visitors || []);
        }

        function renderBarChart(series) {
            var chart = document.getElementById('dauChart');
            clearChildren(chart);

            if (!series.length) {
                chart.appendChild(createTextEl('div', 'DAU 데이터가 없습니다.', 'empty-state'));
                return;
            }

            var maxVal = 1;
            series.forEach(function(d) { if (d.visitors > maxVal) maxVal = d.visitors; });

            series.forEach(function(d) {
                var pct = Math.max((d.visitors / maxVal) * 100, 1.5);
                var label = formatDate(d.date);

                var group = document.createElement('div');
                group.className = 'bar-group';

                var bar = document.createElement('div');
                bar.className = 'bar';
                bar.style.height = pct + '%';

                var tooltip = document.createElement('span');
                tooltip.className = 'bar-tooltip';
                tooltip.textContent = num(d.visitors) + '명';
                bar.appendChild(tooltip);

                var barLabel = document.createElement('span');
                barLabel.className = 'bar-label';
                barLabel.textContent = label;

                group.appendChild(bar);
                group.appendChild(barLabel);
                chart.appendChild(group);
            });
        }

        function renderVisitors(visitors) {
            var tbody = document.getElementById('visitorsBody');
            clearChildren(tbody);

            if (!visitors.length) {
                var tr = document.createElement('tr');
                var td = document.createElement('td');
                td.colSpan = 4;
                td.className = 'empty-state';
                td.textContent = '방문 기록이 없습니다.';
                tr.appendChild(td);
                tbody.appendChild(tr);
                return;
            }

            visitors.forEach(function(v) {
                var tr = document.createElement('tr');
                var fields = [v.username || '-', v.name || '-', v.team_name || '-', formatTime(v.visited_at)];
                fields.forEach(function(text) {
                    var td = document.createElement('td');
                    td.textContent = text;
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });
        }
    </script>
</body>
</html>
