<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">오류 — Claude Code Platform</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .container {
            text-align: center;
            max-width: 480px;
            width: 100%;
        }

        /* ── Icons (CSS-only) ── */

        .illustration {
            position: relative;
            width: 80px;
            height: 96px;
            margin: 0 auto 1.5rem;
        }

        /* Shield — 401, 403 */
        .icon-shield {
            width: 80px;
            height: 96px;
            background: #161b22;
            border: 2px solid #30363d;
            border-radius: 4px 4px 40px 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .icon-shield::after {
            content: '';
            width: 3px;
            height: 32px;
            background: #f85149;
            border-radius: 2px;
            position: absolute;
            top: 22px;
        }
        .icon-shield::before {
            content: '';
            width: 10px;
            height: 10px;
            background: #f85149;
            border-radius: 50%;
            position: absolute;
            top: 58px;
        }

        /* Magnifier — 404 */
        .icon-search {
            width: 80px;
            height: 80px;
            position: relative;
        }
        .icon-search::before {
            content: '';
            width: 46px;
            height: 46px;
            border: 3px solid #58a6ff;
            border-radius: 50%;
            position: absolute;
            top: 0;
            left: 0;
        }
        .icon-search::after {
            content: '';
            width: 3px;
            height: 26px;
            background: #58a6ff;
            border-radius: 2px;
            position: absolute;
            bottom: 2px;
            right: 10px;
            transform: rotate(-45deg);
        }

        /* Warning triangle — 5xx */
        .icon-warning {
            width: 80px;
            height: 70px;
            position: relative;
        }
        .icon-warning::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 40px solid transparent;
            border-right: 40px solid transparent;
            border-bottom: 68px solid #d29922;
            opacity: 0.25;
        }
        .icon-warning-inner {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .icon-warning-bar {
            width: 3px;
            height: 22px;
            background: #d29922;
            border-radius: 2px;
        }
        .icon-warning-dot {
            width: 5px;
            height: 5px;
            background: #d29922;
            border-radius: 50%;
        }

        /* Document with lines — 400 */
        .icon-bad-request {
            width: 64px;
            height: 80px;
            background: #161b22;
            border: 2px solid #30363d;
            border-radius: 4px 12px 4px 4px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .icon-bad-request::before {
            content: '';
            position: absolute;
            top: -2px;
            right: -2px;
            width: 18px;
            height: 18px;
            background: #0d1117;
            border-left: 2px solid #30363d;
            border-bottom: 2px solid #30363d;
            border-radius: 0 0 0 4px;
        }
        .icon-bad-request .line {
            width: 30px;
            height: 2px;
            background: #f85149;
            border-radius: 1px;
        }
        .icon-bad-request .line-short {
            width: 20px;
            height: 2px;
            background: #f85149;
            border-radius: 1px;
            opacity: 0.55;
        }

        /* Error code number */
        .error-code {
            font-size: 5rem;
            font-weight: 700;
            line-height: 1;
            letter-spacing: -0.05em;
            color: #21262d;
            margin-bottom: 0.25rem;
            font-variant-numeric: tabular-nums;
            user-select: none;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #f0f6fc;
            margin-bottom: 0.75rem;
        }

        .description {
            font-size: 1rem;
            color: #8b949e;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        /* Buttons */
        .actions {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            align-items: stretch;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.7rem 1.75rem;
            background: #238636;
            color: #fff;
            border: 1px solid transparent;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
        }
        .btn-primary:hover {
            background: #2ea043;
        }

        .btn-secondary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.7rem 1.75rem;
            background: transparent;
            color: #8b949e;
            border: 1px solid #30363d;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s, border-color 0.2s, color 0.2s;
        }
        .btn-secondary:hover {
            background: #161b22;
            border-color: #484f58;
            color: #e6edf3;
        }
        .btn-primary svg,
        .btn-secondary svg {
            width: 15px;
            height: 15px;
            flex-shrink: 0;
        }

        .footer {
            margin-top: 3rem;
            font-size: 0.8rem;
            color: #484f58;
        }

        /* Responsive */
        @media (max-width: 480px) {
            body { padding: 1rem; }
            .error-code { font-size: 4rem; }
            h1 { font-size: 1.25rem; }
            .description { font-size: 0.9rem; }
            .icon-shield { width: 64px; height: 78px; }
            .icon-shield::after { height: 26px; top: 17px; }
            .icon-shield::before { width: 8px; height: 8px; top: 47px; }
            .icon-search { width: 64px; height: 64px; }
            .icon-search::before { width: 38px; height: 38px; }
            .icon-search::after { height: 20px; right: 6px; }
            .icon-warning { width: 64px; height: 56px; }
            .icon-warning::before { border-left-width: 32px; border-right-width: 32px; border-bottom-width: 54px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Icon — populated by JS -->
        <div class="illustration" id="icon-slot"></div>

        <div class="error-code" id="error-code">503</div>
        <h1 id="error-title">세션 준비 중</h1>
        <p class="description" id="error-desc">
            세션이 아직 준비 중이거나 만료되었습니다.<br>
            로그인하여 새 세션을 시작하세요.
        </p>

        <div class="actions">
            <a href="/" class="btn-primary">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                    <polyline points="10 17 15 12 10 7"/>
                    <line x1="15" y1="12" x2="3" y2="12"/>
                </svg>
                로그인 페이지로 이동
            </a>
            <a href="javascript:void(0)" onclick="history.length > 1 ? history.back() : location.href='/'" class="btn-secondary">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <line x1="19" y1="12" x2="5" y2="12"/>
                    <polyline points="12 19 5 12 12 5"/>
                </svg>
                돌아가기
            </a>
        </div>

        <div class="footer">Powered by Claude Code Platform</div>
    </div>

    <script>
        (function () {
            'use strict';

            /* ── Error definitions ──────────────────────────────────────── */
            var ERRORS = {
                400: { title: '잘못된 요청',        lines: ['요청 형식이 올바르지 않습니다.'],                                                      icon: 'bad-request', docTitle: '400 잘못된 요청' },
                401: { title: '인증 필요',          lines: ['로그인이 필요합니다.', '아래 버튼을 눌러 로그인해주세요.'],                           icon: 'shield',      docTitle: '401 인증 필요' },
                403: { title: '접근 권한 없음',     lines: ['이 페이지에 접근할 권한이 없습니다.', '관리자에게 문의하세요.'],                      icon: 'shield',      docTitle: '403 접근 권한 없음' },
                404: { title: '페이지를 찾을 수 없음', lines: ['요청하신 페이지가 존재하지 않거나 삭제되었습니다.'],                             icon: 'search',      docTitle: '404 페이지를 찾을 수 없음' },
                500: { title: '서버 오류',          lines: ['내부 서버 오류가 발생했습니다.', '잠시 후 다시 시도해주세요.'],                       icon: 'warning',     docTitle: '500 서버 오류' },
                502: { title: '서비스 연결 실패',   lines: ['서비스에 연결할 수 없습니다.', '잠시 후 다시 시도해주세요.'],                         icon: 'warning',     docTitle: '502 서비스 연결 실패' },
                503: { title: '세션 준비 중',       lines: ['세션이 아직 준비 중이거나 만료되었습니다.', '로그인하여 새 세션을 시작하세요.'],     icon: 'warning',     docTitle: '503 세션 준비 중' },
                504: { title: '응답 시간 초과',     lines: ['서버 응답이 지연되고 있습니다.', '잠시 후 다시 시도해주세요.'],                       icon: 'warning',     docTitle: '504 응답 시간 초과' }
            };

            /* ── Icon builders (no innerHTML) ──────────────────────────── */
            function buildShield() {
                var el = document.createElement('div');
                el.className = 'icon-shield';
                return el;
            }

            function buildSearch() {
                var el = document.createElement('div');
                el.className = 'icon-search';
                return el;
            }

            function buildWarning() {
                var el = document.createElement('div');
                el.className = 'icon-warning';
                var inner = document.createElement('div');
                inner.className = 'icon-warning-inner';
                var bar = document.createElement('div');
                bar.className = 'icon-warning-bar';
                var dot = document.createElement('div');
                dot.className = 'icon-warning-dot';
                inner.appendChild(bar);
                inner.appendChild(dot);
                el.appendChild(inner);
                return el;
            }

            function buildBadRequest() {
                var el = document.createElement('div');
                el.className = 'icon-bad-request';
                var l1 = document.createElement('div'); l1.className = 'line';
                var l2 = document.createElement('div'); l2.className = 'line';
                var l3 = document.createElement('div'); l3.className = 'line-short';
                el.appendChild(l1);
                el.appendChild(l2);
                el.appendChild(l3);
                return el;
            }

            /* ── Resolve error code from query param ────────────────────── */
            var params = new URLSearchParams(window.location.search);
            var rawCode = parseInt(params.get('code') || '503', 10);
            var code = ERRORS[rawCode] ? rawCode : 503;
            var cfg = ERRORS[code];

            /* ── Update error code number ───────────────────────────────── */
            document.getElementById('error-code').textContent = String(code);

            /* ── Update title ───────────────────────────────────────────── */
            document.getElementById('error-title').textContent = cfg.title;

            /* ── Update description (safe DOM, no innerHTML) ────────────── */
            var descEl = document.getElementById('error-desc');
            descEl.textContent = '';
            cfg.lines.forEach(function (line, idx) {
                descEl.appendChild(document.createTextNode(line));
                if (idx < cfg.lines.length - 1) {
                    descEl.appendChild(document.createElement('br'));
                }
            });

            /* ── Update document title ──────────────────────────────────── */
            document.getElementById('page-title').textContent = cfg.docTitle + ' — Claude Code Platform';

            /* ── Render icon ────────────────────────────────────────────── */
            var slot = document.getElementById('icon-slot');
            var iconEl;
            switch (cfg.icon) {
                case 'shield':      iconEl = buildShield();     break;
                case 'search':      iconEl = buildSearch();     break;
                case 'warning':     iconEl = buildWarning();    break;
                default:            iconEl = buildBadRequest(); break;
            }
            slot.appendChild(iconEl);

            /* Adjust illustration container dimensions per icon type */
            if (cfg.icon === 'search') {
                slot.style.height = '80px';
            } else if (cfg.icon === 'warning') {
                slot.style.height = '70px';
            } else if (cfg.icon === 'bad-request') {
                slot.style.height = '80px';
                slot.style.width  = '64px';
            }
        }());
    </script>
</body>
</html>
