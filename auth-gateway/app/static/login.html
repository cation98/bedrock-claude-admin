<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Code Terminal — 로그인</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 420px;
            padding: 2rem;
        }
        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .logo h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #f8fafc;
            margin-bottom: 0.5rem;
        }
        .logo p {
            font-size: 0.875rem;
            color: #94a3b8;
        }
        .card {
            background: #1e293b;
            border-radius: 12px;
            padding: 2rem;
            border: 1px solid #334155;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: #cbd5e1;
            margin-bottom: 0.5rem;
        }
        input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: #0f172a;
            border: 1px solid #475569;
            border-radius: 8px;
            color: #f1f5f9;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus {
            border-color: #6366f1;
        }
        input::placeholder {
            color: #64748b;
        }
        .btn {
            width: 100%;
            padding: 0.75rem;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 0.5rem;
        }
        .btn:hover { background: #4f46e5; }
        .btn:disabled {
            background: #475569;
            cursor: not-allowed;
        }
        .btn.loading::after {
            content: '';
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid transparent;
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error {
            background: #450a0a;
            border: 1px solid #dc2626;
            color: #fca5a5;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            margin-bottom: 1rem;
            display: none;
        }
        .status {
            background: #052e16;
            border: 1px solid #16a34a;
            color: #86efac;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            margin-bottom: 1rem;
            display: none;
        }
        .footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: #64748b;
        }
        /* 2FA 인증코드 입력 UI */
        .twofa-section {
            display: none;
            text-align: center;
        }
        .twofa-section.active {
            display: block;
        }
        .tfa-code-input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #334155;
            background: #1e293b;
            color: #f1f5f9;
            border-radius: 0.5rem;
            font-size: 1.5rem;
            text-align: center;
            letter-spacing: 0.5rem;
            font-family: monospace;
        }
        .tfa-code-input:focus {
            border-color: #818cf8;
            outline: none;
        }
        .tfa-info {
            color: #94a3b8;
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }
        .tfa-timer {
            color: #86efac;
            font-size: 0.85rem;
            margin-top: 0.75rem;
        }
        .tfa-timer.expired {
            color: #f87171;
        }
        .tfa-resend {
            color: #818cf8;
            text-decoration: none;
            font-size: 0.8rem;
            cursor: pointer;
            margin-top: 0.5rem;
            display: inline-block;
        }
        .tfa-resend:hover {
            text-decoration: underline;
        }

        /* Spinner animation for status messages */
        .status-spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid transparent;
            border-top-color: #86efac;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        .status.with-spinner {
            display: flex;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>Claude Code Terminal</h1>
            <p>SKO 사내 AI 코딩 어시스턴트</p>
        </div>

        <!-- 시스템 공지 배너 -->
        <div style="background:#1e3a5f;border:1px solid #2563eb;border-radius:8px;padding:1rem 1.25rem;margin-bottom:1.25rem;font-size:0.85rem;line-height:1.6;color:#93c5fd;">
            <span style="font-weight:600;color:#60a5fa;">📢 시스템 공지</span><br>
            금일 ~14:00까지 시스템 개선 작업이 진행 중입니다. 이용은 가능하나 <strong style="color:#fbbf24;">잦은 순단이 발생</strong>할 수 있습니다.<br>
            원활한 이용을 위해 <strong style="color:#f0f9ff;">14시 이후 사용을 권장</strong>드립니다.
        </div>

        <div class="card">
            <div class="error" id="error"></div>
            <div class="status" id="status"></div>

            <!-- 로그인 폼 -->
            <div id="loginSection">
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="username">사번</label>
                    <input type="text" id="username" name="username"
                           placeholder="예: N1102359" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" name="password"
                           placeholder="I-Net 비밀번호" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn" id="loginBtn">로그인</button>
            </form>
            </div>

            <!-- 2FA 인증코드 입력 -->
            <div class="twofa-section" id="tfaSection">
                <p class="tfa-info" id="tfaMessage">인증코드가 발송되었습니다</p>
                <div class="form-group">
                    <label for="tfaCode">인증코드</label>
                    <input type="text" id="tfaCode" class="tfa-code-input"
                           maxlength="6" placeholder="000000"
                           inputmode="numeric" pattern="[0-9]*"
                           autocomplete="one-time-code">
                </div>
                <button class="btn" id="tfaBtn" onclick="handleVerify2fa()">인증 확인</button>
                <p class="tfa-timer" id="tfaTimer">남은 시간: 5:00</p>
                <a class="tfa-resend" onclick="handleResend()">코드 재발송</a>
            </div>
        </div>

        <div class="footer">
            Powered by AWS Bedrock + Claude Code
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;

        // 2FA state
        let currentCodeId = null;
        let tfaTimerInterval = null;
        let loginCredentials = null;

        function setStatusWithSpinner(el, text) {
            el.textContent = '';
            el.classList.add('with-spinner');
            const spinner = document.createElement('span');
            spinner.className = 'status-spinner';
            el.appendChild(spinner);
            el.appendChild(document.createTextNode(text));
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errorEl = document.getElementById('error');
            const statusEl = document.getElementById('status');

            errorEl.style.display = 'none';
            statusEl.style.display = 'none';
            btn.disabled = true;
            btn.classList.add('loading');
            btn.textContent = '인증 중';

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            // 재발송용 자격증명 저장
            loginCredentials = { username, password };

            try {
                // Step 1: SSO 로그인
                const loginRes = await fetch(`${API_BASE}/api/v1/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (!loginRes.ok) {
                    let msg = '인증에 실패했습니다.';
                    try {
                        const err = await loginRes.json();
                        msg = err.detail?.message || err.detail || msg;
                    } catch (_) {
                        if (loginRes.status >= 500) msg = '서버 오류가 발생했습니다. 잠시 후 다시 시도해주세요.';
                    }
                    throw new Error(msg);
                }

                const loginData = await loginRes.json();

                // 2FA 필요 여부 확인
                if (loginData.requires_2fa) {
                    currentCodeId = loginData.code_id;
                    document.getElementById('loginSection').style.display = 'none';
                    document.getElementById('tfaSection').classList.add('active');
                    document.getElementById('tfaMessage').textContent =
                        `${loginData.phone_masked} 로 인증코드를 발송했습니다`;
                    document.getElementById('tfaCode').value = '';
                    document.getElementById('tfaCode').focus();
                    startTfaTimer(300);  // 5분

                    // 로그인 버튼/상태 초기화
                    errorEl.style.display = 'none';
                    statusEl.style.display = 'none';
                    btn.disabled = false;
                    btn.classList.remove('loading');
                    btn.textContent = '로그인';
                    return;
                }

                // 2FA 불필요 (bypass) — 바로 세션 생성 진행
                await proceedWithToken(loginData);

            } catch (err) {
                errorEl.textContent = err.message;
                errorEl.style.display = 'block';
                btn.disabled = false;
                btn.classList.remove('loading');
                btn.textContent = '로그인';
                statusEl.style.display = 'none';
            }
        }

        async function handleVerify2fa() {
            const code = document.getElementById('tfaCode').value.trim();
            const errorEl = document.getElementById('error');
            const tfaBtn = document.getElementById('tfaBtn');

            if (code.length !== 6) {
                errorEl.textContent = '6자리 인증코드를 입력해주세요.';
                errorEl.style.display = 'block';
                return;
            }

            tfaBtn.disabled = true;
            tfaBtn.textContent = '인증 확인 중...';
            errorEl.style.display = 'none';

            try {
                const res = await fetch(`${API_BASE}/api/v1/auth/verify-2fa`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code_id: currentCodeId, code: code })
                });

                if (!res.ok) {
                    let msg = '인증코드 확인에 실패했습니다.';
                    try {
                        const err = await res.json();
                        msg = err.detail || msg;
                    } catch (_) {
                        if (res.status >= 500) msg = '서버 오류가 발생했습니다. 잠시 후 다시 시도해주세요.';
                    }
                    throw new Error(msg);
                }

                const data = await res.json();
                clearInterval(tfaTimerInterval);
                await proceedWithToken(data);

            } catch (err) {
                errorEl.textContent = err.message;
                errorEl.style.display = 'block';
                tfaBtn.disabled = false;
                tfaBtn.textContent = '인증 확인';
                document.getElementById('tfaCode').value = '';
                document.getElementById('tfaCode').focus();
            }
        }

        async function handleResend() {
            if (!loginCredentials) return;
            const errorEl = document.getElementById('error');

            try {
                const res = await fetch(`${API_BASE}/api/v1/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(loginCredentials)
                });

                if (!res.ok) {
                    let msg = '코드 재발송에 실패했습니다.';
                    try {
                        const err = await res.json();
                        msg = err.detail?.message || err.detail || msg;
                    } catch (_) {
                        if (res.status >= 500) msg = '서버 오류가 발생했습니다. 잠시 후 다시 시도해주세요.';
                    }
                    throw new Error(msg);
                }

                const data = await res.json();
                if (data.requires_2fa) {
                    currentCodeId = data.code_id;
                    document.getElementById('tfaMessage').textContent =
                        `새 인증코드가 ${data.phone_masked} 로 발송되었습니다`;
                    document.getElementById('tfaCode').value = '';
                    document.getElementById('tfaCode').focus();
                    startTfaTimer(300);
                    errorEl.style.display = 'none';
                }
            } catch (err) {
                errorEl.textContent = err.message;
                errorEl.style.display = 'block';
            }
        }

        async function proceedWithToken(data) {
            const token = data.access_token;
            const statusEl = document.getElementById('status');
            const btn = document.getElementById('loginBtn');

            // 토큰을 쿠키에 저장 (Hub 포탈에서 Pod 종료 API 호출용)
            document.cookie = `claude_token=${token};path=/;max-age=28800;SameSite=Lax`;

            // 2FA 섹션 숨기고 상태 표시 준비
            document.getElementById('tfaSection').classList.remove('active');
            document.getElementById('loginSection').style.display = '';

            // Step 2: 터미널 세션 생성 (Pod 생성)
            statusEl.textContent = '터미널 환경을 준비하고 있습니다...';
            statusEl.style.display = 'block';
            btn.disabled = true;
            btn.classList.add('loading');
            btn.textContent = '환경 준비 중';

            try {
                const sessionRes = await fetch(`${API_BASE}/api/v1/sessions/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ session_type: 'workshop' })
                });

                if (!sessionRes.ok) {
                    let msg = '터미널 생성에 실패했습니다.';
                    try {
                        const err = await sessionRes.json();
                        msg = err.detail || msg;
                    } catch (_) {
                        if (sessionRes.status >= 500) msg = '서버 오류가 발생했습니다. 잠시 후 다시 시도해주세요.';
                    }
                    throw new Error(msg);
                }

                const sessionData = await sessionRes.json();

                // Step 3: Pod이 Ready될 때까지 대기 (이미 Running이면 빠르게 통과)
                if (sessionData.pod_status === 'running') {
                    setStatusWithSpinner(statusEl, '접속합니다...');
                } else {
                    setStatusWithSpinner(statusEl, '자원 설정 중입니다. 최초 접속 시 3~5분이 소요됩니다.');
                }
                const readySession = await waitForTerminal(token, sessionData.pod_name);

                // Step 4: 허브 페이지가 실제로 응답할 때까지 대기 (503 방지)
                const hubUrl = (readySession && readySession.hub_url) || `/hub/${sessionData.pod_name}/`;
                setStatusWithSpinner(statusEl, '접속 준비 중...');
                await waitForPage(hubUrl);

                // Step 5: 허브 페이지로 리다이렉트
                window.location.href = hubUrl;

            } catch (err) {
                const errorEl = document.getElementById('error');
                errorEl.textContent = err.message;
                errorEl.style.display = 'block';
                btn.disabled = false;
                btn.classList.remove('loading');
                btn.textContent = '로그인';
                statusEl.style.display = 'none';
            }
        }

        function startTfaTimer(seconds) {
            clearInterval(tfaTimerInterval);
            let remaining = seconds;
            const timerEl = document.getElementById('tfaTimer');
            timerEl.classList.remove('expired');
            timerEl.style.color = '';

            tfaTimerInterval = setInterval(() => {
                remaining--;
                const min = Math.floor(remaining / 60);
                const sec = remaining % 60;
                timerEl.textContent = `남은 시간: ${min}:${String(sec).padStart(2, '0')}`;

                if (remaining <= 60) timerEl.style.color = '#fbbf24';
                if (remaining <= 0) {
                    clearInterval(tfaTimerInterval);
                    timerEl.textContent = '인증코드가 만료되었습니다';
                    timerEl.classList.add('expired');
                    timerEl.style.color = '';
                }
            }, 1000);
        }

        async function waitForTerminal(token, podName) {
            const maxWait = 600;  // 10분 (노드 스케일링 포함)
            const statusEl = document.getElementById('status');
            for (let i = 0; i < maxWait; i += 5) {
                await new Promise(r => setTimeout(r, 5000));

                const elapsed = i + 5;

                // Staged progress messages with spinner
                if (elapsed <= 15) {
                    setStatusWithSpinner(statusEl, '환경을 준비하고 있습니다...');
                } else if (elapsed <= 60) {
                    setStatusWithSpinner(statusEl, '노드를 설정하고 있습니다... (약 2분 소요)');
                } else if (elapsed <= 180) {
                    setStatusWithSpinner(statusEl, 'Pod을 시작하고 있습니다... 잠시만 기다려주세요');
                } else {
                    setStatusWithSpinner(statusEl, '거의 완료되었습니다...');
                }

                try {
                    const res = await fetch(`${API_BASE}/api/v1/sessions/`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const data = await res.json();
                    const session = data.sessions.find(s => s.pod_name === podName);
                    if (session && session.pod_status === 'running') {
                        setStatusWithSpinner(statusEl, '터미널에 접속합니다...');
                        return session;
                    }
                } catch (e) {
                    // retry
                }
            }
            throw new Error('자원 설정 시간이 초과되었습니다. 관리자에게 문의해주세요. (10분 초과)');
        }

        async function waitForPage(url) {
            for (let i = 0; i < 20; i++) {
                try {
                    const res = await fetch(url);
                    if (res.ok) return;  // 200 → 준비 완료
                } catch (e) {
                    // network error, retry
                }
                await new Promise(r => setTimeout(r, 3000));
            }
            // 60초 후에도 실패하면 그냥 리다이렉트
        }

        // Enter key handler for 2FA code input
        document.getElementById('tfaCode').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') handleVerify2fa();
        });
    </script>
</body>
</html>
